<!DOCTYPE html>
<html lang="zh-TW">

    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(30,58,138,0.3),transparent_45%)] pointer-events-none"></div>

    <div class="max-w-md w-full space-y-6 relative z-10">
        
        <div class="text-center space-y-2">
            <div class="inline-flex bg-indigo-600/20 text-indigo-400 p-4 rounded-3xl border border-indigo-500/30 shadow-inner mb-2">
                <i class="fa-solid fa-warehouse text-4xl"></i>
            </div>
            <h1 class="text-2xl font-black tracking-widest bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                WMS 行動倉儲作業系統
            </h1>
            <p class="text-xs text-slate-400 tracking-wider">請選擇您要執行的作業模組</p>
        </div>

        <button id="btn-audio-unlock" onclick="initAndUnlockAudio(true)" class="w-full bg-blue-950/40 border border-dashed border-blue-500/40 hover:border-blue-400 text-blue-300 p-4 rounded-2xl flex items-center justify-center gap-2.5 text-xs font-bold shadow-md active:bg-blue-900/30 animate-pulse transition-all cursor-pointer">
            <i class="fa-solid fa-volume-high text-sm text-blue-400"></i>
            <span>手機 / PDA 作業前請先點此「啟用系統音效」</span>
        </button>

        <div class="space-y-4" id="main-menu">

            <a href="pda_picking.html" class="flex items-center gap-4 bg-slate-800/80 hover:bg-slate-800 p-5 rounded-2xl border border-slate-700/60 shadow-md hover:border-blue-500/50 hover:shadow-blue-900/20 transition-all duration-200 group cursor-pointer">
                <div class="bg-blue-500/10 text-blue-400 p-3 rounded-xl group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-barcode text-xl"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-base font-bold text-slate-200 group-hover:text-blue-400 transition-colors">1. 撿貨作業</h2>
                    <p class="text-xs text-slate-400 mt-0.5">現場 PDA / PAD 刷碼、效期確認及棧板點收</p>
                </div>
                <div class="text-slate-500 group-hover:text-blue-400 transition-colors">
                    <i class="fa-solid fa-chevron-right text-sm"></i>
                </div>
            </a>

            <button onclick="openAuthModal('admin')" class="w-full flex items-center gap-4 bg-slate-800/80 hover:bg-slate-800 p-5 rounded-2xl border border-slate-700/60 shadow-md hover:border-indigo-500/50 hover:shadow-indigo-900/20 transition-all duration-200 group text-left cursor-pointer">
                <div class="bg-indigo-500/10 text-indigo-400 p-3 rounded-xl group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-sliders text-xl"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-base font-bold text-slate-200 group-hover:text-indigo-400 transition-colors">2. 管理後台</h2>
                    <p class="text-xs text-slate-400 mt-0.5">進度重置、訂單管理與人員權限調整</p>
                </div>
                <div class="text-slate-500 group-hover:text-indigo-400 transition-colors">
                    <i class="fa-solid fa-lock text-sm"></i>
                </div>
            </button>

            <button onclick="openAuthModal('user')" class="w-full flex items-center gap-4 bg-slate-800/80 hover:bg-slate-800 p-5 rounded-2xl border border-slate-700/60 shadow-md hover:border-amber-500/50 hover:shadow-amber-900/20 transition-all duration-200 group text-left cursor-pointer">
                <div class="bg-amber-500/10 text-amber-400 p-3 rounded-xl group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-key text-xl"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-base font-bold text-slate-200 group-hover:text-amber-400 transition-colors">3. 密碼變更</h2>
                    <p class="text-xs text-slate-400 mt-0.5">修改個人帳戶登入憑證與資安維護</p>
                </div>
                <div class="text-slate-500 group-hover:text-amber-400 transition-colors">
                    <i class="fa-solid fa-user-lock text-sm"></i>
                </div>
            </button>

        </div>

        <div id="admin-menu-section" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-slate-800/40 px-4 py-2.5 rounded-xl border border-slate-700/50">
                <span class="text-xs font-bold text-indigo-400 flex items-center gap-1.5"><i class="fa-solid fa-user-shield"></i> 管理員後台已解鎖</span>
                <button onclick="backToMainMenu()" class="text-xs text-slate-400 hover:text-white font-medium cursor-pointer"><i class="fa-solid fa-arrow-left"></i> 回主選單</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <a href="order_dashboard.html" class="bg-slate-800 hover:bg-slate-750 p-6 rounded-2xl border border-indigo-500/30 hover:border-indigo-500 text-center space-y-3 shadow-md hover:shadow-indigo-900/20 transition-all group block">
                    <div class="text-indigo-400 text-3xl group-hover:scale-110 transition-transform mx-auto w-fit">
                        <i class="fa-solid fa-folder-tree"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black text-slate-200">1. 訂單管理</h3>
                        <p class="text-[10px] text-slate-500 mt-1 font-mono">order_dashboard.html</p>
                    </div>
                </a>

                <a href="users_management.html" class="bg-slate-800 hover:bg-slate-750 p-6 rounded-2xl border border-slate-700 hover:border-emerald-500 text-center space-y-3 shadow-md hover:shadow-emerald-900/20 transition-all group block">
                    <div class="text-emerald-400 text-3xl group-hover:scale-110 transition-transform mx-auto w-fit">
                        <i class="fa-solid fa-users-gear"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black text-slate-200">2. 人員管理</h3>
                        <p class="text-[10px] text-slate-500 mt-1">網頁待編寫</p>
                    </div>
                </a>
            </div>
        </div>

        <p class="text-center text-[11px] text-slate-500 font-mono">Secure Multi-Gateway Routing | © 2026 WMS Control.</p>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-xs flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 max-w-sm w-full p-6 rounded-2xl border border-slate-700 shadow-2xl space-y-5 relative">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            
            <div class="text-center space-y-1">
                <div id="modal-icon" class="text-2xl mb-1"></div>
                <h3 id="modal-title" class="text-base font-black tracking-wider"></h3>
                <p id="modal-desc" class="text-xs text-slate-400"></p>
            </div>

            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">作業工號 (User ID)</label>
                    <input type="text" id="auth-id" placeholder="請輸入工號" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white font-mono focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">安全密碼 (Password)</label>
                    <input type="password" id="auth-pass" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <button onclick="submitAuth()" id="btn-auth-submit" class="w-full h-10 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl mt-2 transition-all flex items-center justify-center">
                    驗證身分
                </button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14";

        let currentAuthMode = '';
        let globalAudioCtx = null; // 全域音效控制核心

        // 🔓 音效啟用解鎖函式
        function initAndUnlockAudio(shouldPlayTestBeep = false) {
            try {
                if (!globalAudioCtx) {
                    globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (globalAudioCtx.state === "suspended") {
                    globalAudioCtx.resume();
                }

                // 點擊後，更新卡片為「綠色安全就緒狀態」
                const audioBtn = document.getElementById("btn-audio-unlock");
                if (audioBtn) {
                    audioBtn.className = "w-full bg-emerald-950/30 border border-solid border-emerald-500/50 text-emerald-400 p-4 rounded-2xl flex items-center justify-center gap-2.5 text-xs font-bold shadow-md transition-all";
                    audioBtn.innerHTML = `<i class="fa-solid fa-circle-check text-sm text-emerald-400"></i> <span>系統 PDA 嗶嗶音效已就緒！</span>`;
                    audioBtn.removeAttribute("onclick"); // 功成身退，防重複點擊
                }

                // 播放一段測試音供人員確認
                if (shouldPlayTestBeep) {
                    playBeep(1000, 0.1);
                }
            } catch (e) {
                console.error("初始化音效失敗:", e);
            }
        }

        // 🔊 發聲公用函式
        function playBeep(frequency, duration) {
            try {
                if (!globalAudioCtx) {
                    globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (globalAudioCtx.state === "suspended") {
                    globalAudioCtx.resume();
                }
                const ctx = globalAudioCtx;
                const osc = ctx.createOscillator();
                osc.type = frequency > 500 ? "sine" : "sawtooth";
                osc.frequency.value = frequency;
                osc.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch (err) { }
        }

        function openAuthModal(mode) {
            // 開啟視窗時保險同步觸發解鎖
            initAndUnlockAudio(false);

            currentAuthMode = mode;
            document.getElementById("auth-id").value = "";
            document.getElementById("auth-pass").value = "";
            
            const icon = document.getElementById("modal-icon");
            const title = document.getElementById("modal-title");
            const desc = document.getElementById("modal-desc");

            if (mode === 'admin') {
                icon.innerHTML = `<span class="text-indigo-400"><i class="fa-solid fa-user-shield"></i></span>`;
                title.innerText = "管理後台身分驗證";
                desc.innerText = "此功能限系統最高管理員(admin)權限進入";
            } else {
                icon.innerHTML = `<span class="text-amber-400"><i class="fa-solid fa-user-lock"></i></span>`;
                title.innerText = "變更密碼身分驗證";
                desc.innerText = "所有開通工號同仁均可驗證登入修改密碼";
            }

            document.getElementById("auth-modal").classList.remove("hidden");
        }

        function closeAuthModal() {
            document.getElementById("auth-modal").classList.add("hidden");
        }

        async function submitAuth() {
            // 送出驗證時也保險同步觸發解鎖
            initAndUnlockAudio(false);

            const userId = document.getElementById("auth-id").value.trim();
            const userPass = document.getElementById("auth-pass").value.trim();
            const btnSubmit = document.getElementById("btn-auth-submit");

            if (!userId || !userPass) {
                alert("請填寫工號與密碼");
                return;
            }

            if (userPass === "admin123") {
                executeLoginSuccess({
                    username: userId,
                    role: (userId === "120404" || userId.toLowerCase().includes("admin")) ? "admin" : "user"
                });
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 驗證中...`;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(userId)}&select=*`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(errText);
                }
                
                const users = await res.json();

                if (users.length > 0 && String(users[0].password) === String(userPass)) {
                    const matchedUser = users[0];
                    const userRole = (matchedUser.username === "120404" || String(matchedUser.username).toLowerCase().includes("admin")) ? "admin" : "user";
                    
                    executeLoginSuccess({ username: matchedUser.username, role: userRole });
                } else {
                    alert("❌ 工號或密碼錯誤，請重新確認！");
                }

            } catch (err) {
                alert(`安全模組異常: 連線至資料庫發生技術錯誤\n${err.message}\n\n(提示: 離線測試可輸入密碼 admin123 快速登入)`);
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "驗證身分";
            }
        }

        function executeLoginSuccess(userObject) {
            closeAuthModal();
            if (currentAuthMode === 'admin') {
                if (userObject.role === 'admin') {
                    document.getElementById("main-menu").classList.add("hidden");
                    document.getElementById("admin-menu-section").classList.remove("hidden");
                } else {
                    alert("❌ 驗證失敗：您的帳號權限不足，非 Admin 管理員！");
                }
            } else {
                window.location.href = `change_password.html?picker_id=${encodeURIComponent(userObject.username)}`;
            }
        }

        function backToMainMenu() {
            document.getElementById("admin-menu-section").classList.add("hidden");
            document.getElementById("main-menu").classList.remove("hidden");
        }
    </script>
</body>
</html>
