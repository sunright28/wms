                if (!cachedData) {

                    CURRENT_USER_ROLE = userObj.role ? userObj.role.trim().toLowerCase() : "user"; // 權限角色

                    // if (CURRENT_USER_ROLE !== "admin" && CURRENT_USER_ROLE !== "supervisor") {
                    //     alert("❌ 權限不足：您目前的職責無法存取管理後台控制台！");
                    //     window.location.href = "index.html";

                    // }

                    sessionStorage.removeItem("currentUser");

    <script>
        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14";
        let currentPickerTableId = null;
        const currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");

        let currentPickerId = CURRENT_USER_ID || "";
        let currentPickerName = CURRENT_USER_NAME || "";
        let activePalletObject = null;   
        let currentPalletItems = [];
        let currentPalletId = null;

        let html5QrScanner = null;
        let isProcessingScan = false; // 防重覆觸發鎖
        function logout() {
            if (confirm("確定要登出系統並切換作業帳號嗎？")) {
                stopCameraScanner(); 
                
                // 1. 清除 LocalStorage 快取（統一與 index.html 格式對接）
                localStorage.removeItem("currentUser");
                
                // 2. 還原全域變數
                currentPickerTableId = null;
                CURRENT_USER_= "";
                CURRENT_USER_NAME = "";
                
                // 3. 修正：不要原地重整，直接跳轉回到主選單 index.html
                window.location.href = "index.html"; 
            }
        }

                // 📅 初始化日期控制項（如果沒選，預設為今日 YYYY-MM-DD）
        function initFilterDate() {
            const dateInput = document.getElementById("filter-date");
            if (dateInput && !dateInput.value) {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                dateInput.value = `${yyyy}-${mm}-${dd}`;
            }
        }

        // 🔄 載入訂單波次清單 (僅修改時間軸計算，其餘卡片生成與內部邏輯完全不變)
        async function loadOrders() {
            const container = document.getElementById("order-list");
            const loader = document.getElementById("loader-orders");
            const icon = document.getElementById("refresh-icon");
            const errCard = document.getElementById("api-error-card");
            
            container.innerHTML = "";
            errCard.classList.add("hidden");
            loader.classList.remove("hidden");
            if (icon) icon.classList.add("animate-spin");

            // 🎯 1. 初始化並取得使用者選擇的基準日期與自訂天數
            initFilterDate(); 
            const baseDateStr = document.getElementById("filter-date").value;
            
            // 取得輸入的天數，如果框框被清空或不合法，預設為 5 天
            const daysInput = document.getElementById("filter-days");
            const targetDays = (daysInput && daysInput.value !== "") ? parseInt(daysInput.value) : 5;
            
            // 🎯 2. 核心時間軸計算：
            // 起始日 = 基準日的前 1 天 (-1)
            const startDate = new Date(baseDateStr);
            startDate.setDate(startDate.getDate() - 1); 

            // 截止日 = 基準日的後 N 天 (+targetDays)
            const endDate = new Date(baseDateStr);
            endDate.setDate(endDate.getDate() + targetDays); 

            // 轉回 Supabase 相容的 YYYY-MM-DD 格式文字列
            const formatDate = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            const startDateISO = formatDate(startDate);
            const endDateISO = formatDate(endDate);

            try {
                // 🎯 3. 修改 API URL 條件：將新計算出來的「前1天」與「後N天」代入查詢
                const apiFilterUrl = `${SUPABASE_URL}/rest/v1/orders?ship_date=gte.${startDateISO}&ship_date=lte.${endDateISO}&order=ship_date.asc,id.asc`;
                
                const response = await fetch(apiFilterUrl, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                if (!response.ok) throw new Error(await response.text());
                const allOrders = await response.json();

                const activeOrders = allOrders.filter(order => (parseInt(order.pallets_picked) || 0) < (parseInt(order.total_pallets) || 0));

                if (activeOrders.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-10 text-gray-400 italic bg-white rounded-xl border border-dashed border-gray-300 px-4 space-y-1">
                            <p class="font-bold text-gray-500">📭 找不到對應的未完工單據</p>
                            <p class="text-[11px]">區間：${startDateISO} ～ ${endDateISO}</p>
                        </div>`;
                    return;
                }

                // 【以下原封不動】卡片畫面生成與原有連動機制完全維持不變
                activeOrders.forEach((order) => {
                    const card = document.createElement("div");
                    card.className = "bg-white rounded-xl shadow-xs border border-gray-200 overflow-hidden";
                    card.innerHTML = `
                        <div onclick="toggleOrderGroup(${order.id})" class="p-4 bg-white active:bg-gray-50 flex justify-between items-center cursor-pointer border-b border-gray-100">
                            <div class="space-y-0.5">
                                <div class="flex items-center gap-2">
                                    <span class="bg-gray-800 text-white font-mono text-[11px] font-bold px-1.5 py-0.5 rounded">波次</span>
                                    <h4 class="font-bold text-base text-gray-800">${order.order_no || "未命名"}</h4>
                                </div>
                                <p class="text-xs text-gray-500 font-medium"><i class="fa-solid fa-truck-ramp-box text-gray-400 text-[11px]"></i> 客戶: ${order.ship_vendor || "未知廠商"}</p>
                                <p class="text-[11px] text-blue-600 font-mono font-bold"><i class="fa-solid fa-calendar text-[10px]"></i> 出貨日: ${order.ship_date || "未定"}</p>
                            </div>
                            <div class="flex items-center gap-2 text-right">
                                <span class="bg-blue-50 text-blue-600 font-mono text-xs font-bold px-2 py-1 rounded-md border border-blue-100">
                                    進度: ${order.pallets_picked || 0} / ${order.total_pallets || 0} 板
                                </span>
                                <i id="arrow-${order.id}" class="fa-solid fa-chevron-down text-gray-400 transition-transform"></i>
                            </div>
                        </div>
                        <div id="sub-pallets-${order.id}" class="hidden bg-gray-50/50 divide-y divide-gray-100">
                            <div class="p-4 text-center text-xs text-gray-400"><i class="fa-solid fa-spinner animate-spin"></i> 正在連線查閱所有棧板...</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                errCard.classList.remove("hidden");
                document.getElementById("api-error-text").innerText = err.message;
            } finally {
                if (loader) loader.classList.add("hidden");
                if (icon) icon.classList.remove("animate-spin");
            }
              playBeep(880, 0.08);
              setTimeout(() => playBeep(1200, 0.15), 80);
        }

        // 📂 動態抓取該單據下的所有棧板（支援本人續接，非本人鎖定機制）
        async function toggleOrderGroup(orderId) {
            const subBox = document.getElementById(`sub-pallets-${orderId}`);
            const arrow = document.getElementById(`arrow-${orderId}`);
            if (!subBox || !arrow) return;

            const isHidden = subBox.classList.contains("hidden");
            subBox.classList.toggle("hidden");
            arrow.classList.toggle("rotate-180");

            if (isHidden) {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?order_id=eq.${orderId}&order=id.asc`, {
                        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                    });
                    if (!response.ok) throw new Error("撈取關聯棧板失敗");
                    const childPallets = await response.json();

                    subBox.innerHTML = ""; 
                    if (childPallets.length === 0) {
                        subBox.innerHTML = `<div class="p-3 text-center text-xs text-gray-400 italic">⚠️ 本波次單據底下無配置任何棧板</div>`;
                        return;
                    }

                    childPallets.forEach(p => {
                        const row = document.createElement("div");
                        const currentStatus = p.status || '待撿貨';
                        
                        // 🎯【權威判定】：對齊最上層防闖警衛數字 ID
                        const isMyOwnJob = (
                            currentStatus === "撿貨中" && 
                            p.picker_id !== null && 
                            parseInt(p.picker_id) === parseInt(CURRENT_USER_TABLE_ID)
                        );
                        
                        // 🎯【安全鎖定】：別人正在撿，或者已經完工
                        const isLocked = ((currentStatus === "撿貨中" && !isMyOwnJob) || currentStatus === "已完成");

                        // --- 1. 計算畫面徽章（Badge）顏色與文字 ---
                        let badgeColor = "bg-gray-200 text-gray-600 border-gray-300";
                        let statusText = currentStatus;

                        if (currentStatus === "待撿貨") {
                            badgeColor = "bg-amber-100 text-amber-900 border-amber-200";
                        } else if (currentStatus === "撿貨中") {
                            if (isMyOwnJob) {
                                badgeColor = "bg-blue-600 text-white border-blue-700 animate-pulse font-black";
                                statusText = "續撿中";
                            } else {
                                badgeColor = "bg-blue-100 text-blue-900 border-blue-200 animate-pulse";
                            }
                        } else if (currentStatus === "已完成") {
                            badgeColor = "bg-green-100 text-green-900 border-green-200";
                        }
                        
                        if (isLocked) statusText = currentStatus + ' (鎖定)';

                        // --- 2. 計算小鎖頭或作業中圖示 ---
                        let lockIcon = '';
                        if (isLocked) {
                            lockIcon = `<i class="fa-solid fa-lock text-red-500 ml-1 text-xs"></i>`;
                        } else if (isMyOwnJob) {
                            lockIcon = `<i class="fa-solid fa-user-pen text-blue-600 ml-1 text-xs" title="您的續撿任務"></i>`;
                        }

                        // --- 3. 動態判定橫條（Row）的外部框架樣式（確保非鎖定狀態顏色清晰可點） ---
                        if (isLocked) {
                            row.className = "p-3.5 flex justify-between items-center bg-gray-100 opacity-50 cursor-not-allowed transition-colors border-b border-gray-100";
                        } else {
                            if (isMyOwnJob) {
                                // 💡 續撿中橫條：給予淡淡的藍色外觀與左側亮藍條，提示作業員優先點擊
                                row.className = "p-3.5 flex justify-between items-center bg-blue-50/60 active:bg-blue-100/80 cursor-pointer transition-colors border-l-4 border-blue-600 border-b border-gray-100";
                            } else {
                                row.className = "p-3.5 flex justify-between items-center bg-white active:bg-gray-50 cursor-pointer transition-colors border-b border-gray-100";
                            }
                        }

                        // --- 4. 【關鍵修改】：先鋪設 HTML 結構，不要急著綁 onclick ---
                        row.innerHTML = `
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-white border border-gray-200 flex items-center justify-center text-gray-500 text-sm shadow-2xs">
                                    <i class="fa-solid fa-pallet text-amber-600"></i>
                                </div>
                                <div>
                                    <p class="font-mono text-sm font-bold text-gray-700">${p.pallet_no || '未編號'}${lockIcon}</p>
                                    <p class="text-[11px] text-gray-400">規格: ${p.total_pieces || 0}件 / ${p.total_weight || 0}kg</p>
                                </div>
                            </div>
                            <span class="text-xs font-bold px-2.5 py-1 rounded-md border shadow-2xs ${badgeColor}">
                                ${statusText} <i class="fa-solid fa-chevron-right text-[9px] ml-0.5"></i>
                            </span>
                        `;

                        // --- 5. 【關鍵修改】：HTML 渲染完畢後，最後才正式綁定安全的點擊事件 ---
                        row.onclick = () => {
                            if (isLocked) {
                                playBeep(300, 0.3);
                                alert(`🚫 安全防護：該棧板目前由其他人員 [狀態: ${currentStatus}] 作業中，已被系統鎖定！`);
                            } else {
                                console.log(`⚡ [續撿/開撿觸發] 棧板編號: ${p.pallet_no}, ID: ${p.id}`);
                                activePalletObject = p; 
                                startPicking(p.id);
                            }
                        };

                        subBox.appendChild(row);
                    });
                } catch (err) {
                    subBox.innerHTML = `<div class="p-3 text-xs text-red-500 bg-red-50 font-mono">❌ 讀取失敗: ${err.message}</div>`;
                }
            }
        }

        // 🎯 進入明細撿貨頁面
        async function startPicking(palletId) {
            currentPalletId = palletId;
            let pInfo = activePalletObject || {};
     
            // 🎯【安全防線修正】：導入數字 ID 與字串工號的雙重防護驗證，徹底防呆
            const checkStatus = pInfo.status || '待撿貨';
            const dbPickerId = pInfo.picker_id ? String(pInfo.picker_id).trim() : '';
            const myIdStr = currentPickerId ? String(currentPickerId).trim() : '';
            const myTableIdStr = CURRENT_USER_TABLE_ID ? String(CURRENT_USER_TABLE_ID).trim() : '';
            
            // 💡 只有當「既不等於我的數字 ID」而且「也不等於我的工號字串」時，才判定為別人的工作
            const isNotMyJob = (
                checkStatus === "撿貨中" && 
                dbPickerId !== myTableIdStr 
            );

            if (isNotMyJob || checkStatus === "已完成") {
                playBeep(300, 0.3);
                alert(`🚫 點選失敗：該棧板剛剛已被其他人員更新或完工。系統將自動重新整理清單。`);
                loadOrders(); 
                return;
            }

            // ================= 🌟【核心修正：第一個品項開始時，強制寫入主表格 pallet_orders】=================
            const nowISO = new Date().toISOString();
            
            // 抓取全域的數字型態 ID（從 index 傳過來解開的整數）
            const numericPickerId = parseInt(currentPickerTableId) || 1;

            // 同步更新本地端記憶體快取
            pInfo.status = "撿貨中";
            pInfo.picker_id = myIdStr; 
            pInfo.start_time = nowISO;

            try {
                console.log(`正在更新主表格 pallet_orders ID: ${palletId}, 寫入的數字 ID: ${numericPickerId}`);
                const syncResponse = await fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?id=eq.${palletId}`, {
                    method: "PATCH",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        status: "撿貨中",
                        picker_id: numericPickerId, // 💡 丟入整數 ID，對齊 Supabase 外鍵
                        start_time: nowISO
                    })
                });

                if (!syncResponse.ok) {
                    console.error("雲端主表格 pallet_orders 寫入失敗，原因：", await syncResponse.text());
                } else {
                    console.log("✅ 雲端主表格 pallet_orders 的 status、picker_id、start_time 已成功同步寫入！");
                }
            } catch (syncErr) {
                console.error("主表格網路連線寫入異常:", syncErr);
            }
            // 以下完整保留原本的畫面渲染與明細載入邏輯，不作任何更動
            document.getElementById("lbl-pallet-no").innerText = pInfo.pallet_no || "-";
            document.getElementById("lbl-vendor").innerText = pInfo.ship_vendor || "未指定";
            document.getElementById("lbl-date").innerText = pInfo.ship_date || "-";
            document.getElementById("lbl-weight").innerText = `${pInfo.total_weight || 0} kg`;
            document.getElementById("lbl-cubic").innerText = `${pInfo.total_cubic || 0} 材`;
            document.getElementById("lbl-ratio").innerText = `${Math.round((pInfo.space_ratio || 0) * 100)} %`;
            document.getElementById("lbl-pieces").innerText = `${pInfo.total_pieces || 0} 件`;

            document.getElementById("page-orders").classList.add("hidden");
            document.getElementById("page-picking").classList.remove("hidden");

            const listContainer = document.getElementById("item-list");
            const loader = document.getElementById("loader-items");
            listContainer.innerHTML = "";
            if (loader) loader.classList.remove("hidden");

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pallet_items?order_pallet_id=eq.${palletId}&select=*`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                if (!response.ok) throw new Error("物料明細撈取失敗");
                const rawItems = await response.json();

                rawItems.sort((a, b) => {
                    const weightA = parseFloat(a.unit_weight) || 0;
                    const weightB = parseFloat(b.unit_weight) || 0;
                    if (weightB !== weightA) return weightB - weightA;
                    return (a.exp_date || "9999-12-31").localeCompare(b.exp_date || "9999-12-31");
                });

                currentPalletItems = rawItems.map(item => ({ ...item, qty_picked_pcs: parseInt(item.qty_picked_pcs) || 0 }));

                currentPalletItems.forEach((item, index) => {
                    const itemCard = document.createElement("div");
                    itemCard.id = `picker-row-${index}`;
                    
                    const targetPcs = parseInt(item.qty_target_pcs) || 0;
                    const isDone = item.qty_picked_pcs >= targetPcs && targetPcs > 0;
                    const hasNoExp = !item.exp_date || item.exp_date.trim() === "" || item.exp_date === "-" || item.exp_date.includes("請先設定");
                    
                    if (isDone) {
                        itemCard.className = "bg-white rounded-xl shadow-xs border border-green-500 bg-green-50/20 opacity-50 p-4 space-y-3 relative overflow-hidden transition-all duration-300";
                    } else if (hasNoExp) {
                        itemCard.className = "bg-amber-50/60 rounded-xl shadow-xs border border-amber-300 p-4 space-y-3 relative overflow-hidden transition-all duration-300";
                    } else {
                        itemCard.className = "bg-white rounded-xl shadow-xs border border-gray-200 p-4 space-y-3 relative overflow-hidden transition-all duration-300";
                    }
                    
                    let expHtml = !hasNoExp ? `
                        <span class="text-xs text-gray-500 font-medium"><i class="fa-solid fa-clock-rotate-left"></i> 產品效期:</span>
                        <span class="text-sm font-mono text-red-600 font-bold">${item.exp_date}</span>
                    ` : `
                        <div class="flex items-center gap-2 w-full">
                            <span class="text-xs text-red-600 font-bold shrink-0 animate-pulse"><i class="fa-solid fa-triangle-exclamation"></i> 請設定效期:</span>
                            <input type="date" id="input-exp-${item.id}" class="text-xs border border-amber-300 rounded px-1.5 py-1 focus:outline-none focus:border-blue-500 font-mono bg-white grow">
                            <button onclick="updateExpiry(${item.id}, ${index})" id="btn-save-exp-${item.id}" class="bg-amber-600 active:bg-amber-700 text-white text-xs font-bold px-2.5 py-1.5 rounded shadow-xs shrink-0 flex items-center gap-1">
                                <i class="fa-solid fa-floppy-disk"></i> 儲存
                            </button>
                        </div>
                    `;

                    let progressBoxClass = isDone ? "text-center bg-green-100 p-1.5 rounded-lg border border-green-300 text-green-800" : "text-center bg-gray-100 p-1.5 rounded-lg border border-gray-300";
                    let countTextClass = isDone ? "text-green-700 font-black" : "text-blue-600";
                    let btnHtml = isDone ? `<i class="fa-solid fa-circle-check"></i> 本品項已全數點收` : `<i class="fa-solid fa-plus-circle"></i> 手動點收一件 (+1)`;
                    let btnClass = isDone ? "w-full mt-2 bg-green-600 text-white font-bold py-2.5 rounded-xl text-sm shadow-sm flex items-center justify-center gap-1 cursor-not-allowed" : "w-full mt-2 bg-gray-800 active:bg-blue-700 text-white font-bold py-2.5 rounded-xl text-sm shadow-sm flex items-center justify-center gap-1 transition-colors";
                    let btnAction = isDone ? "" : `onclick="addPickCount(${index})"`;

                    let itemStatusBadge = `<span id="item-status-badge-${index}" class="text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-gray-100 text-gray-500">${item.status || '待撿貨'}</span>`;
                    if (item.status === "撿貨中") itemStatusBadge = `<span id="item-status-badge-${index}" class="text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-blue-100 text-blue-700">撿貨中</span>`;
                    if (item.status === "已完成" || isDone) itemStatusBadge = `<span id="item-status-badge-${index}" class="text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-green-100 text-green-700">已完成</span>`;

                    itemCard.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-1.5">
                                <span class="text-[11px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded font-mono font-bold">項次 ${item.line_no || '001'}</span>
                                ${itemStatusBadge}
                            </div>
                            <span class="text-xs bg-blue-50 text-blue-700 font-mono font-bold px-2 py-0.5 rounded border border-blue-100">單箱重: ${item.unit_weight || 0} kg</span>
                        </div>
                        <div class="space-y-0.5">
                            <p class="text-xs font-mono tracking-wide text-gray-400 font-bold">${item.item_no || '-'}</p>
                            <h4 class="text-base font-black text-gray-900 tracking-tight leading-tight">${item.item_name || '-'}</h4>
                        </div>
                        <div id="exp-block-${item.id}" class="bg-gray-50 p-2 rounded-lg flex justify-between items-center border border-gray-100">
                            ${expHtml}
                        </div>
                        <div class="grid grid-cols-3 gap-2 pt-1">
                            <div class="text-center bg-blue-50/50 p-1.5 rounded-lg border border-blue-100/60">
                                <p class="text-[10px] text-blue-500 font-medium">預計撿貨數</p>
                                <p class="text-sm font-black font-mono text-blue-700 mt-0.5">${item.qty_target_text || '0'}</p>
                            </div>
                            <div class="text-center bg-gray-50 p-1.5 rounded-lg">
                                <p class="text-[10px] text-gray-400 font-medium">訂單原始數</p>
                                <p class="text-sm font-bold font-mono text-gray-600 mt-0.5">${item.qty_order_text || '0'}</p>
                            </div>
                            <div id="progress-box-${index}" class="${progressBoxClass}">
                                <p class="text-[10px] text-gray-500 font-medium">點收進度</p>
                                <p class="text-sm font-black font-mono mt-0.5">
                                    <span id="picked-pcs-${index}" class="${countTextClass}">${item.qty_picked_pcs}</span> 
                                    <span class="text-gray-400">/</span> 
                                    <span class="text-gray-800">${targetPcs} 件</span>
                                </p>
                            </div>
                        </div>
                        <button id="btn-check-${index}" ${btnAction} class="${btnClass}">
                            ${btnHtml}
                        </button>
                    `;
                    listContainer.appendChild(itemCard);
                });

                if(rawItems.length === 0) listContainer.innerHTML = `<div class="text-center py-12 text-gray-400 italic">此棧板無明細資料</div>`;
                focusScanInput();

            } catch (err) {
                alert(err.message);
                backToOrders();
            } finally {
                if (loader) loader.classList.add("hidden");
            }
        }
        // 💾 效期回存
        async function updateExpiry(itemId, index) {
            const dateInput = document.getElementById(`input-exp-${itemId}`);
            const btnSave = document.getElementById(`btn-save-exp-${itemId}`);
            const expBlock = document.getElementById(`exp-block-${itemId}`);
            const selectedDate = dateInput.value;

            if (!selectedDate) {
                alert("請先選擇有效的效期日期！");
                return;
            }

            dateInput.disabled = true;
            btnSave.disabled = true;
            btnSave.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i>`;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pallet_items?id=eq.${itemId}`, {
                    method: "PATCH",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ exp_date: selectedDate })
                });
                if (!response.ok) throw new Error("雲端資料庫更新效期失敗");

                if (currentPalletItems[index]) currentPalletItems[index].exp_date = selectedDate;

                expBlock.innerHTML = `
                    <span class="text-xs text-gray-500 font-medium"><i class="fa-solid fa-clock-rotate-left"></i> 產品效期:</span>
                    <span class="text-sm font-mono text-red-600 font-bold">${selectedDate}</span>
                `;

                const card = document.getElementById(`picker-row-${index}`);
                if (card) card.className = "bg-white rounded-xl shadow-xs border border-gray-200 p-4 space-y-3 relative overflow-hidden transition-all duration-300";

                showScanFeedback(`✅ 效期設定成功！請再次掃描條碼點收。`, "success");
            } catch (error) {
                alert(`❌ 儲存失敗！\n原因：${error.message}`);
                dateInput.disabled = false;
                btnSave.disabled = false;
                btnSave.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> 儲存`;
            } finally {
                focusScanInput();
            }
        }

        // 🔊 頂部動態非阻斷提示條（取代 alert 讓相機不凍結）
        function showScanFeedback(text, type) {
            const bar = document.getElementById("scan-feedback-bar");
            if (!bar) return;

            bar.classList.remove("hidden", "bg-green-500", "bg-red-500", "bg-amber-500", "text-white");
            bar.innerText = text;

            if (type === "success") bar.classList.add("bg-green-500", "text-white");
            if (type === "error") bar.classList.add("bg-red-500", "text-white");
            if (type === "warn") bar.classList.add("bg-amber-500", "text-white");

            bar.classList.remove("hidden");
            
            // 3秒後自動隱藏提示條
            setTimeout(() => { bar.classList.add("hidden"); }, 3000);
        }

        // 💡 核心點收回存機制
        async function addPickCount(index) {
            const item = currentPalletItems[index];
            if (!item) return;

            const hasNoExp = !item.exp_date || item.exp_date.trim() === "" || item.exp_date === "-" || item.exp_date.includes("請先設定");
            if (hasNoExp) {
                playBeep(180, 0.4); 
                // 改用動態橫幅提示，不使用 alert() 阻斷相機
                showScanFeedback(`⚠️ 安全阻斷：[ ${item.item_no} ] 尚未設定效期！`, "warn");
                
                const cardEl = document.getElementById(`picker-row-${index}`);
                if (cardEl) {
                    cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    cardEl.classList.add("error-flash");
                    setTimeout(() => cardEl.classList.remove("error-flash"), 1200);
                }
                return; 
            }

            const targetPcs = parseInt(item.qty_target_pcs) || 0;
            if (item.qty_picked_pcs >= targetPcs) return;

            const pInfo = activePalletObject;
            if (pInfo && pInfo.status !== "撿貨中") {
                const nowISO = new Date().toISOString();
                pInfo.status = "撿貨中";
                pInfo.start_time = nowISO;
                pInfo.picker_id = currentPickerTableId; 

                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?id=eq.${currentPalletId}`, {
                        method: "PATCH",
                        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ start_time: nowISO, picker_id: currentPickerTableId, status: "撿貨中" })
                    });
                } catch (e) { console.error("❌ 狀態同步失敗:", e); }
            }

            item.qty_picked_pcs += 1;
            let nextItemStatus = item.qty_picked_pcs === targetPcs ? "已完成" : "撿貨中";
            item.status = nextItemStatus; 

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/pallet_items?id=eq.${item.id}`, {
                    method: "PATCH",
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ qty_picked_pcs: item.qty_picked_pcs, status: nextItemStatus })
                });
            } catch (err) { console.error(`❌ 明細 API 連線異常:`, err); }

            const card = document.getElementById(`picker-row-${index}`);
            const countText = document.getElementById(`picked-pcs-${index}`);
            const progressBox = document.getElementById(`progress-box-${index}`);
            const btn = document.getElementById(`btn-check-${index}`);
            const badge = document.getElementById(`item-status-badge-${index}`);

            if (countText) countText.innerText = item.qty_picked_pcs;

            if (badge) {
                badge.className = nextItemStatus === "已完成" ? "text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-green-100 text-green-700" : "text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-blue-100 text-blue-700";
                badge.innerText = nextItemStatus;
            }

            if (item.qty_picked_pcs === targetPcs) {
                playBeep(1200, 0.15); 
                if (card) card.className = "bg-white rounded-xl shadow-xs border border-green-500 bg-green-50/20 opacity-50 p-4 space-y-3 relative overflow-hidden transition-all duration-300";
                if (progressBox) progressBox.className = "text-center bg-green-100 p-1.5 rounded-lg border border-green-300 text-green-800";
                if (countText) countText.className = "text-green-700 font-black";
                if (btn) {
                    btn.className = "w-full mt-2 bg-green-600 text-white font-bold py-2.5 rounded-xl text-sm shadow-sm flex items-center justify-center gap-1 cursor-not-allowed";
                    btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> 本品項已全數點收`;
                    btn.onclick = null;
                }
                showScanFeedback(`🎉 [ ${item.item_name} ] 已收滿！`, "success");
                checkAllItemsCompleted();
            } else {
                playBeep(900, 0.05); 
                if (progressBox) progressBox.className = "text-center bg-blue-50 p-1.5 rounded-lg border border-blue-400";
                if (countText) countText.className = "text-blue-600 font-black text-base animate-pulse";
                showScanFeedback(`點收: [ ${item.item_name} ] 累計 ${item.qty_picked_pcs} 件`, "success");
            }
        }

        // 💡 檢查結案與主單連動
        function checkAllItemsCompleted() {
            const isAllDone = currentPalletItems.every(item => item.status === "已完成");

            if (isAllDone && currentPalletId) {
                const nowISO = new Date().toISOString();

                fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?id=eq.${currentPalletId}`, {
                    method: "PATCH",
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ end_time: nowISO, status: "已完成" })
                })
                .then(async (res) => {
                    if(!res.ok) throw new Error("棧板結案寫入失敗");
                    
                    if (activePalletObject && activePalletObject.order_id) {
                        try {
                            const checkPalletsRes = await fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?order_id=eq.${activePalletObject.order_id}`, {
                                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                            });
                            const allPalletsOfThisOrder = await checkPalletsRes.json();
                            const totalCompletedCount = allPalletsOfThisOrder.filter(p => p.status === "已完成").length;
                            
                            await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${activePalletObject.order_id}`, {
                                method: "PATCH",
                                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                                body: JSON.stringify({ pallets_picked: totalCompletedCount })
                            });
                        } catch (errOrder) { console.error("同步主單進度失敗:", errOrder); }
                    }

                    setTimeout(() => {
                        alert("🎉 太棒了！本棧板所有品項已全數點收完畢，單據已自動結案！");
                        backToOrders();
                    }, 500);
                })
                .catch(err => console.error("結案失敗:", err));
            }
        }

        function backToOrders() {
            stopCameraScanner(); 
            document.getElementById("page-orders").classList.remove("hidden");
            document.getElementById("page-picking").classList.add("hidden");
            loadOrders(); 
        }

// 🔄 回復至重新掃描待命狀態（支援動態冷卻時間）
        function focusScanInput(delayMs = 50) {
            setTimeout(() => {
                const scanInput = document.getElementById("pda-scan-input");
                if (scanInput && !document.getElementById("page-picking").classList.contains("hidden")) {
                    scanInput.value = ""; 
                    scanInput.focus();   
                }
                // 🔓 只有在指定的延遲時間（例如 3 秒）結束後，才徹底釋放鎖定
                isProcessingScan = false;
            }, delayMs);
        }

        // 📷 控制相機開啟與關閉
        function toggleCameraScanner() {
            const container = document.getElementById("camera-scanner-container");
            const btnText = document.getElementById("btn-camera-text");

            if (container.classList.contains("hidden")) {
                container.classList.remove("hidden");
                btnText.innerText = "關閉手機相機掃描";
                
                html5QrScanner = new Html5Qrcode("qr-reader");
                const config = { fps: 15, qrbox: { width: 260, height: 160 }, aspectRatio: 1.777778 };

                html5QrScanner.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
                .catch(err => {
                    alert("相機開啟失敗: " + err);
                    stopCameraScanner();
                });
            } else {
                stopCameraScanner();
            }
        }

// 📷 相機成功辨識條碼 【最前端攔截機制】
        async function onScanSuccess(decodedText, decodedResult) {
            // 🛑 核心防禦：如果目前正在 3 秒冷卻鎖定中，最前端直接無視、不排隊、直接退回！
            if (isProcessingScan || !decodedText) return;
            
            // 🔒 觸發成功立刻上鎖
            isProcessingScan = true; 
            
            // 呼叫核心比對方法
            await processBarcodeData(decodedText.trim());
        }

        function onScanFailure(error) {}

        // 🔤 集中處理條碼比對與輸入流邏輯（加入 3 秒與 1.5 秒中斷機制）
        async function processBarcodeData(barcode) {
            if (!barcode) {
                focusScanInput(0); // 空值直接解鎖
                return;
            }

            // 🎯 【修改點】：將 PDA 掃描到的條碼轉為字串並去除前後空白
            let scanBarcode = String(barcode).trim();
            let foundIndex = -1;
            
            for (let i = 0; i < currentPalletItems.length; i++) {
                const item = currentPalletItems[i];
                const targetPcs = parseInt(item.qty_target_pcs) || 0;
                
                // 🎯 【關鍵修改】：改為抓取資料庫新開的 14 碼外箱條碼欄位 `b_code`
                // 💡 加上防呆機制：若 b_code 不存在則退回比對原本的 13 碼商品碼 (item.barcode)
                let dbBoxBarcode = item.b_code ? String(item.b_code).trim() : "";
                let dbItemBarcode = item.barcode ? String(item.barcode).trim() : "";

                // 比對 PDA 刷入的條碼是否符合新欄位 b_code (或舊欄位 barcode) 且該品項尚未收滿
                if ((scanBarcode === dbBoxBarcode || scanBarcode === dbItemBarcode) && item.qty_picked_pcs < targetPcs) {
                    foundIndex = i;
                    break; 
                }
            }

            if (foundIndex !== -1) {
                // 執行點數增加與防呆
                await addPickCount(foundIndex);
                
                // 畫面平滑捲動到卡片
                const rowEl = document.getElementById(`picker-row-${foundIndex}`);
                if (rowEl) rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // 💡 成功點收：頂部跳出黃色提示，並強制冷卻/中斷 3000 毫秒 (3秒)
                showScanFeedback(`⏱️ 點收成功！系統處理中，請稍候 3 秒...`, "warn");
                focusScanInput(3000); 
            } else {
                playBeep(300, 0.3); 
                showScanFeedback(`❌ 條碼 [${scanBarcode}] 比對失敗！品項已滿或無此商品`, "error");
                
                // 💡 比對失敗：為了防工作人員手抖重覆刷到，同樣給予 1500 毫秒 (1.5秒) 的防抖冷卻時間
                focusScanInput(1500); 
            }
        }

        function stopCameraScanner() {
            const container = document.getElementById("camera-scanner-container");
            const btnText = document.getElementById("btn-camera-text");
            
            if (html5QrScanner) {
                html5QrScanner.stop().then(() => { html5QrScanner = null; }).catch(err => {});
            }
            if (container) container.classList.add("hidden");
            if (btnText) btnText.innerText = "開啟手機相機掃描";
            focusScanInput();
        }

 

        // 空白處點擊防呆

// 🎯 終極融合：全網頁只保留這一個 DOMContentLoaded 監聽器，絕不允許變數被洗掉
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const urlUserTableId = urlParams.get('picker_table_id') || urlParams.get('id');

            // 🌟 核心優先序：防闖警衛解鎖的ID > 網址帶入的ID > 預設值 1
            if (CURRENT_USER_TABLE_ID) {
                currentPickerTableId = parseInt(CURRENT_USER_TABLE_ID);
            } else if (urlUserTableId) {
                currentPickerTableId = parseInt(urlUserTableId);
            } else {
                currentPickerTableId = 1; 
            }
            
            // 綁定其餘顯示用的全域變數
            currentPickerId = CURRENT_USER_ID || "PDA";      
            currentPickerName = CURRENT_USER_NAME || "PDA";  

            console.log("🚀 [系統初始化成功] 目前登入者資料庫流水號數字 ID:", currentPickerTableId);
            // ================= 🌟【關鍵修改：將姓名與工號帶入頂端 Badge】=================
            const userBadgeEl = document.getElementById("user-badge");
            if (userBadgeEl) {
                // 格式如：[A001] 王小明 (可依現場喜好自行微調格式)
                userBadgeEl.innerText = `[${currentPickerId}] ${currentPickerName}`;
            }
            // =========================================================================
            // 顯示主要訂單畫面並載入
            document.getElementById("page-orders").classList.remove("hidden");
            loadOrders();
        });
        // 實體 Enter 監聽器 (PDA槍用)
        document.addEventListener("keyup", (e) => {
            const scanInput = document.getElementById("pda-scan-input");
            if (!scanInput || document.getElementById("page-picking").classList.contains("hidden") || isProcessingScan) return;

            if (e.key === "Enter") {
                isProcessingScan = true;
                const barcode = scanInput.value.trim();
                processBarcodeData(barcode);
            }
        });

        function playBeep(frequency, duration) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = frequency > 500 ? "sine" : "sawtooth";
                osc.frequency.value = frequency;
                osc.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch (err) { }
        }



</script>
