<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS 後台訂單管理中樞 - 行動響應版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 針對行動端優化滾動條與優雅點擊防誤觸 */
        body { -webkit-tap-highlight-color: transparent; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen">

    <header class="bg-slate-800/90 backdrop-blur-md border-b border-slate-700/60 sticky top-0 z-50 px-4 py-3.5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 shadow-lg">
        <div class="flex items-center gap-2.5">
            <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md shadow-indigo-900/30 shrink-0">
                <i class="fa-solid fa-sitemap text-base"></i>
            </div>
            <div>
                <h1 class="text-base font-black tracking-wider text-white">WMS 兩層式訂單管理</h1>
                <p class="text-[10px] text-indigo-400 font-medium">手機/平板/PDA 行動智能優化中樞</p>
            </div>
        </div>
        <a href="index.html" class="w-full sm:w-auto text-center bg-slate-700 hover:bg-slate-600 text-slate-200 px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1.5 shadow-xs cursor-pointer">
            <i class="fa-solid fa-arrow-left-long"></i> 返回中控首頁
        </a>
    </header>

    <main class="max-w-7xl mx-auto p-3 sm:p-6 space-y-4">

        <div class="bg-slate-800/60 rounded-2xl border border-slate-700/50 p-3.5 shadow-xl grid grid-cols-1 sm:grid-cols-3 gap-3 items-end text-sm">
            <div class="grid grid-cols-2 gap-2 sm:col-span-2">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">起算日期</label>
                    <div class="relative bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 flex items-center">
                        <input type="date" id="date-start" class="w-full bg-transparent text-white font-mono text-xs focus:outline-none cursor-pointer">
                        <span class="absolute right-3 text-slate-400 pointer-events-none text-xs"><i class="fa-solid fa-calendar-days"></i></span>
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">結束日期</label>
                    <div class="relative bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 flex items-center">
                        <input type="date" id="date-end" class="w-full bg-transparent text-white font-mono text-xs focus:outline-none cursor-pointer">
                        <span class="absolute right-3 text-slate-400 pointer-events-none text-xs"><i class="fa-solid fa-calendar-days"></i></span>
                    </div>
                </div>
            </div>
            <div class="flex gap-2 w-full">
                <button onclick="fetchOrdersByGroup()" class="flex-1 h-11 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md text-xs transition-all flex items-center justify-center gap-1.5 cursor-pointer">
                    <i class="fa-solid fa-magnifying-glass"></i> 查詢訂單
                </button>
                <button onclick="initDates(true)" class="bg-slate-700 hover:bg-slate-600 text-slate-300 px-3.5 h-11 rounded-xl transition-all cursor-pointer"><i class="fa-solid fa-arrow-rotate-left text-xs"></i></button>
            </div>
        </div>

        <div id="loader-status" class="hidden text-center py-12 space-y-3 bg-slate-800/20 rounded-2xl border border-dashed border-slate-700/60">
            <div class="inline-block animate-spin rounded-full h-7 w-7 border-3 border-indigo-500 border-t-transparent"></div>
            <p class="text-[11px] text-slate-400 tracking-wider">正在載入訂單與一列式行動報表...</p>
        </div>

        <div id="dashboard-content" class="space-y-3.5"></div>

    </main>

    <script>
        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co";
        // 🔑 金鑰已徹底修正：尾數改為真正生效的「小寫 u8」
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14";

        document.addEventListener("DOMContentLoaded", () => { 
            initDates(false); 
            fetchOrdersByGroup(); 
        });

        function initDates(forceRefetch) {
            const today = new Date(); const start = new Date(); const end = new Date();
            start.setDate(today.getDate() - 5); end.setDate(today.getDate() + 5);
            document.getElementById("date-start").value = start.toISOString().split('T')[0];
            document.getElementById("date-end").value = end.toISOString().split('T')[0];
            if(forceRefetch) fetchOrdersByGroup();
        }

        async function fetchOrdersByGroup() {
            const start = document.getElementById("date-start").value;
            const end = document.getElementById("date-end").value;
            const loader = document.getElementById("loader-status");
            const content = document.getElementById("dashboard-content");

            if(!start || !end) return alert("請選擇日期");
            content.innerHTML = ""; loader.classList.remove("hidden");

            try {
                // 這裡沿用原功能：拉取 pallet_orders 並關聯 users 資訊
                const url = `${SUPABASE_URL}/rest/v1/pallet_orders?select=*,users(display_name)&ship_date=gte.${start}&ship_date=lte.${end}&order=id.asc`;
                const res = await fetch(url, { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } });
                if (!res.ok) throw new Error(await res.text());
                const rawPallets = await res.json();

                if(rawPallets.length === 0) {
                    content.innerHTML = `<div class="text-center py-12 bg-slate-800/30 rounded-2xl border border-slate-800 border-dashed text-slate-500 italic text-xs"><i class="fa-solid fa-folder-open text-xl mb-2 block"></i> 此區間內無任何訂單資料。</div>`;
                    return;
                }

                const orderGroup = {};
                rawPallets.forEach(pallet => {
                    const orderNo = pallet.order_no || `ORD-${pallet.ship_vendor}-${pallet.ship_date}`;
                    const orderKey = orderNo;
                    
                    if(!orderGroup[orderKey]) {
                        orderGroup[orderKey] = {
                            order_no: pallet.order_no || '未編號',
                            order_id: pallet.order_id || null,
                            ship_vendor: pallet.ship_vendor || '未知客戶',
                            ship_date: pallet.ship_date,
                            pallets: [],
                            total_weight: 0,
                            total_volume: 0,
                            total_pieces: 0
                        };
                    }
                    orderGroup[orderKey].pallets.push(pallet);
                    orderGroup[orderKey].total_weight += (parseFloat(pallet.total_weight) || 0);
                    orderGroup[orderKey].total_volume += (parseFloat(pallet.total_cubic) || 0); 
                    orderGroup[orderKey].total_pieces += (parseInt(pallet.total_pieces) || 0);
                });

                let orderIndex = 1;
                for(let key in orderGroup) {
                    const order = orderGroup[key];
                    const orderDomId = `order-box-${orderIndex}`;
                    const palletPanelId = `pallet-panel-${orderIndex}`;

                    const orderCard = document.createElement("div");
                    orderCard.className = "bg-slate-800/90 rounded-2xl border border-slate-700/60 shadow-lg p-3.5 space-y-3";
                    orderCard.id = orderDomId;
                    
                    orderCard.innerHTML = `
                        <div class="flex flex-col gap-3 cursor-pointer" onclick="togglePalletPanel(${orderIndex})">
                            <div class="flex items-start justify-between w-full">
                                <div class="flex items-center gap-2.5">
                                    <div class="w-9 h-9 rounded-lg bg-indigo-600/20 text-indigo-400 flex items-center justify-center text-base shadow-inner shrink-0"><i class="fa-solid fa-file-invoice"></i></div>
                                    <div>
                                        <h3 class="font-black text-white text-sm tracking-wide">${order.ship_vendor}</h3>
                                        <div class="text-[10px] text-slate-400 mt-0.5">預計出貨：<span class="font-mono text-slate-300 font-bold">${order.ship_date}</span></div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2" onclick="event.stopPropagation();">
                                    <button onclick="deleteEntireOrderGroup('${order.ship_vendor}', '${order.ship_date}', ${JSON.stringify(order.pallets.map(p=>p.id)).replace(/"/g, '&quot;')})" class="bg-red-500/10 active:bg-red-500 text-red-400 active:text-white border border-red-500/20 text-[10px] px-2.5 py-1.5 rounded-lg font-bold flex items-center gap-1 cursor-pointer">
                                        <i class="fa-solid fa-trash-can"></i> 刪除
                                    </button>
                                    <div class="text-slate-400 p-1" onclick="togglePalletPanel(${orderIndex})">
                                        <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200" id="arrow-icon-${orderIndex}"></i>
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-wrap gap-1.5">
                                <span class="text-[10px] font-mono bg-slate-900 px-2 py-1 rounded-md text-indigo-300 border border-slate-700/50 break-all max-w-full">單號: ${order.order_no}</span>
                                <span class="text-[10px] font-bold bg-indigo-950 text-indigo-400 border border-indigo-800/40 px-2 py-1 rounded-md">棧板數: ${order.pallets.length} P</span>
                            </div>

                            <div class="grid grid-cols-3 bg-slate-900/50 rounded-xl border border-slate-700/30 p-2 text-center text-xs font-mono">
                                <div class="border-r border-slate-800/80">
                                    <span class="text-[9px] text-slate-500 block">總件數</span>
                                    <span class="text-slate-200 font-black text-xs">${order.total_pieces}<span class="text-[9px] font-normal text-slate-500 ml-0.5">件</span></span>
                                </div>
                                <div class="border-r border-slate-800/80">
                                    <span class="text-[9px] text-slate-500 block">總重量</span>
                                    <span class="text-amber-400 font-black text-xs">${order.total_weight.toFixed(1)}<span class="text-[9px] font-normal text-slate-500 ml-0.5">kg</span></span>
                                </div>
                                <div>
                                    <span class="text-[9px] text-slate-500 block">總才積</span>
                                    <span class="text-emerald-400 font-black text-xs">${order.total_volume.toFixed(1)}<span class="text-[9px] font-normal text-slate-500 ml-0.5">才</span></span>
                                </div>
                            </div>
                        </div>

                        <div id="${palletPanelId}" class="hidden pl-2 border-l border-indigo-500/40 space-y-2.5 pt-2 animate-fade-in">
                        </div>
                    `;
                    content.appendChild(orderCard);

                    const palletContainer = document.getElementById(palletPanelId);
                    order.pallets.forEach(pallet => {
                        const isRollbackable = (pallet.status === "撿貨中" || pallet.status === "已完成");
                        let statusColor = "bg-slate-700 text-slate-400 border-slate-600/50";
                        if(pallet.status === "待撿貨") statusColor = "bg-amber-500/10 text-amber-400 border-amber-500/30";
                        if(pallet.status === "撿貨中") statusColor = "bg-blue-500/10 text-blue-400 border-blue-500/30";
                        if(pallet.status === "已完成") statusColor = "bg-emerald-500/10 text-emerald-400 border-emerald-500/30";

                        let displayName = "無";
                        if (pallet.users && pallet.users.display_name) {
                            displayName = pallet.users.display_name;
                        } else if (pallet.picker_id) {
                            displayName = `工號:${pallet.picker_id}`;
                        }

                        const weightVal = parseFloat(pallet.total_weight) || 0;
                        const cubicVal = parseFloat(pallet.total_cubic) || 0;
                        const piecesVal = parseInt(pallet.total_pieces) || 0;
                        
                        let ratioStr = "0%";
                        if (pallet.space_ratio !== null && pallet.space_ratio !== undefined) {
                            const parsedRatio = parseFloat(pallet.space_ratio);
                            if (!isNaN(parsedRatio)) {
                                ratioStr = String(pallet.space_ratio).includes('%') ? pallet.space_ratio : `${Math.round(parsedRatio * 100)}%`;
                            }
                        }
                        const totalDuration = calculateDuration(pallet.start_time, pallet.end_time);

                        const palletCard = document.createElement("div");
                        palletCard.className = "bg-slate-900/60 rounded-xl p-3 border border-slate-700/40 text-[11px] space-y-2.5 shadow-xs";
                        palletCard.innerHTML = `
                            <div class="flex justify-between items-center gap-2 border-b border-slate-800 pb-2">
                                <div class="flex items-center gap-1.5">
                                    <i class="fa-solid fa-pallet text-slate-500"></i>
                                    <span class="font-mono text-slate-100 font-black text-xs">${pallet.pallet_no || '未編碼'}</span>
                                    <span class="text-slate-600">|</span>
                                    <span class="text-emerald-400 font-bold">${displayName}</span>
                                </div>
                                <div class="flex items-center gap-1">
                                    <span class="border text-[9px] px-1.5 py-0.5 rounded font-bold ${statusColor}">${pallet.status}</span>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-x-3 gap-y-1.5 text-slate-400">
                                <div>件數: <span class="text-slate-200 font-bold">${piecesVal} 件</span></div>
                                <div>重量: <span class="text-slate-200 font-bold">${weightVal} KG</span></div>
                                <div>才積: <span class="text-slate-200 font-bold">${cubicVal} 才</span></div>
                                <div>容積比: <span class="text-amber-400 font-bold">${ratioStr}</span></div>
                            </div>

                            <div class="bg-slate-950/40 p-1.5 rounded-lg border border-slate-800 text-[10px] font-mono space-y-0.5 text-slate-500">
                                <div>開始: <span class="text-slate-300">${formatTime(pallet.start_time)}</span></div>
                                <div>結束: <span class="text-slate-300">${formatTime(pallet.end_time)}</span></div>
                                <div class="text-indigo-400 pt-0.5 border-t border-slate-900/60 mt-0.5 flex justify-between">
                                    <span>總作業工時:</span>
                                    <span class="font-bold text-white">${totalDuration}</span>
                                </div>
                            </div>
                            
                            <div id="item-list-sub-${pallet.id}" class="bg-slate-950/80 p-2 rounded-lg border border-slate-950 divide-y divide-slate-800">
                            </div>

                            <div class="flex justify-between items-center gap-2 pt-1">
                                <span class="bg-slate-950 text-slate-600 px-1.5 py-0.5 rounded text-[9px] font-mono">ID: ${pallet.id}</span>
                                <button onclick="rollbackPallet(${pallet.id}, '${pallet.pallet_no}', ${pallet.order_id || 'null'})" 
                                        ${!isRollbackable ? 'disabled class="bg-slate-800 text-slate-600 px-2.5 py-2 text-[10px] rounded-lg cursor-not-allowed"' : 'class="bg-amber-600 active:bg-amber-700 text-slate-950 font-black px-3 py-2 text-[10px] rounded-lg transition-all flex items-center gap-1 cursor-pointer"'}>
                                    <i class="fa-solid fa-arrow-rotate-left"></i> 退回未撿貨
                                </button>
                            </div>
                        `;
                        palletContainer.appendChild(palletCard);
                        fetchPalletItemsSub(pallet.id);
                    });

                    orderIndex++;
                }

            } catch (err) {
                content.innerHTML = `<div class="bg-red-500/10 border border-red-500/30 text-red-400 p-3 rounded-xl text-xs font-mono break-all">加載失敗: ${err.message}</div>`;
            } finally { loader.classList.add("hidden"); }
        }

        function togglePalletPanel(index) {
            const panel = document.getElementById(`pallet-panel-${index}`);
            const arrow = document.getElementById(`arrow-icon-${index}`);
            if(panel.classList.contains("hidden")) {
                panel.classList.remove("hidden"); arrow.classList.add("rotate-180");
            } else {
                panel.classList.add("hidden"); arrow.classList.remove("rotate-180");
            }
        }

        async function fetchPalletItemsSub(palletId) {
            const container = document.getElementById(`item-list-sub-${palletId}`);
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/pallet_items?order_pallet_id=eq.${palletId}&order=id.asc`, { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } });
                const items = await res.json();
                if(items.length === 0) { container.innerHTML = `<div class="text-slate-600 italic p-1 text-[10px]">無品項資料</div>`; return; }
                container.innerHTML = "";
                items.forEach((item, i) => {
                    const row = document.createElement("div");
                    row.className = "py-1.5 flex flex-col gap-0.5 text-[10px] text-slate-400";
                    row.innerHTML = `
                        <div class="text-slate-200"><span class="text-slate-500">${i+1}.</span> <span class="font-bold text-white">${item.item_no}</span></div>
                        <div class="text-slate-400 truncate">${item.item_spec || ''}</div>
                        <div class="flex justify-between items-center mt-0.5 text-[9px] font-mono">
                            <div>效期: <span class="${item.exp_date!==item.ori_date?'text-amber-400 font-bold':''}">${item.exp_date}</span></div>
                            <div class="text-slate-400">進度: <span class="text-white font-bold text-[11px]">${item.qty_picked_pcs}</span>/${item.qty_target_pcs} 件 │ <span class="${item.status==='已完成'?'text-emerald-400 font-bold':'text-slate-500'}">${item.status}</span></div>
                        </div>
                    `;
                    container.appendChild(row);
                });
            } catch(e) { container.innerHTML = `<div class="text-red-400 text-[10px]">無法讀取明細</div>`; }
        }

        async function deleteEntireOrderGroup(vendor, date, palletIds) {
            if(!confirm(`🚨 永久刪除訂單核心警告！\n\n確定要永久刪除客戶 [ ${vendor} ] 的整筆訂單嗎？`)) return;

            try {
                for(let pid of palletIds) {
                    await fetch(`${SUPABASE_URL}/rest/v1/pallet_items?order_pallet_id=eq.${pid}`, { method: "DELETE", headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } });
                    await fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?id=eq.${pid}`, { method: "DELETE", headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } });
                }
                alert(`🗑️ 該訂單及其附屬棧板已成功完全永久刪除！`);
                fetchOrdersByGroup();
            } catch (err) { alert(`刪除異常：${err.message}`); }
        }

        async function rollbackPallet(palletId, palletNo, orderId) {
            if(!confirm(`⚠️ 確定要將棧板 [ ${palletNo} ] 退回待撿貨狀態嗎？`)) return;

            try {
                const orderRes = await fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?id=eq.${palletId}`, {
                    method: "PATCH",
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ status: "待撿貨", start_time: null, end_time: null, picker_id: null })
                });
                if(!orderRes.ok) throw new Error("主檔更新失敗");

                const itemsRes = await fetch(`${SUPABASE_URL}/rest/v1/pallet_items?order_pallet_id=eq.${palletId}`, { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } });
                const currentItems = await itemsRes.json();

                for(let item of currentItems) {
                    await fetch(`${SUPABASE_URL}/rest/v1/pallet_items?id=eq.${item.id}`, {
                        method: "PATCH",
                        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ status: "待撿貨", qty_picked_pcs: 0, exp_date: item.ori_date })
                    });
                }

                if(orderId) {
                    try {
                        const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}&select=pallets_picked`, {
                            headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                        });
                        
                        if(checkRes.ok) {
                            const orderRecord = await checkRes.json();
                            if(orderRecord && orderRecord.length > 0) {
                                const currentPicked = parseInt(orderRecord[0].pallets_picked) || 0;
                                const updatedPicked = Math.max(0, currentPicked - 1);
                                
                                await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}`, {
                                    method: "PATCH",
                                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                                    body: JSON.stringify({ pallets_picked: updatedPicked })
                                });
                            }
                        }
                    } catch(orderErr) {
                        console.error("同步完工進度非預期錯誤:", orderErr);
                    }
                }

                alert(`🎉 棧板 [ ${palletNo} ] 已成功退回未撿貨狀態！`);
                fetchOrdersByGroup();
            } catch (err) { alert(`退回失敗：${err.message}`); }
        }

        function formatTime(isoString) {
            if(!isoString) return `00:00:00`;
            try { 
                const d = new Date(isoString);
                return d.toTimeString().split(' ')[0]; 
            } catch(e) { return `00:00:00`; }
        }

        function calculateDuration(startIso, endIso) {
            if (!startIso || !endIso) return "00:00:00";
            try {
                const diffMs = new Date(endIso) - new Date(startIso);
                if (diffMs <= 0) return "00:00:00";
                
                const totalSecs = Math.floor(diffMs / 1000);
                const hrs = Math.floor(totalSecs / 3600).toString().padStart(2, '0');
                const mins = Math.floor((totalSecs % 3600) / 60).toString().padStart(2, '0');
                const secs = (totalSecs % 60).toString().padStart(2, '0');
                
                return `${hrs}:${mins}:${secs}`;
            } catch (e) {
                return "00:00:00";
            }
        }
    </script>
</body>
</html>
