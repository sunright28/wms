<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS 系統安全 - 變更個人密碼</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(245,158,11,0.15),transparent_45%)] pointer-events-none"></div>

    <div class="max-w-md w-full bg-slate-800/90 p-6 rounded-3xl border border-slate-700/80 shadow-2xl space-y-6 relative z-10">
        
        <div class="text-center space-y-2">
            <div class="inline-flex bg-amber-500/10 text-amber-400 p-3 rounded-2xl border border-amber-500/30">
                <i class="fa-solid fa-key text-2xl"></i>
            </div>
            <h2 class="text-xl font-black tracking-wider">變更帳戶密碼</h2>
            <p class="text-xs text-slate-400">請設定您在 WMS 系統中的新安全登入密碼</p>
        </div>

        <div class="space-y-4 text-sm">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">目前作業工號 (User ID)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="display-username" readonly class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl pl-10 pr-3 py-2.5 font-mono text-slate-400 cursor-not-allowed">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-300 mb-1">請輸入新密碼 (New Password)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="new-password" placeholder="請輸入新密碼" class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-10 pr-3 py-2.5 text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-300 mb-1">再次確認新密碼 (Confirm Password)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-circle-check"></i></span>
                    <input type="password" id="confirm-password" placeholder="請再次輸入新密碼" class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-10 pr-3 py-2.5 text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div class="pt-2 space-y-2">
                <button onclick="updatePasswordInDB()" id="btn-submit" class="w-full h-11 bg-amber-500 hover:bg-amber-600 text-slate-950 font-black rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i> 儲存並更新密碼
                </button>
                
                <a href="index.html" class="w-full h-10 bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold rounded-xl transition-all flex items-center justify-center gap-2 text-xs">
                    <i class="fa-solid fa-arrow-left"></i> 放棄修改，回首頁
                </a>
            </div>
        </div>
    </div>

    <script>
        // 🚀 100% 精準對接您原稿的設定
        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14";

        let targetUsername = "";

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            targetUsername = urlParams.get('picker_id');

            if (!targetUsername) {
                alert("⚠️ 未偵測到合法工號授權，返回主頁面！");
                window.location.href = "index.html";
                return;
            }
            document.getElementById("display-username").value = targetUsername;
        });

        async function updatePasswordInDB() {
            const newPass = document.getElementById("new-password").value.trim();
            const confirmPass = document.getElementById("confirm-password").value.trim();
            const btnSubmit = document.getElementById("btn-submit");

            if (!newPass || !confirmPass) {
                alert("❌ 請完整填寫密碼！");
                return;
            }
            if (newPass !== confirmPass) {
                alert("❌ 兩次輸入密碼不一致！");
                return;
            }

            // 本地測試放行機制
            if (targetUsername === "111111" && newPass === "1234") {
                alert("🎉 [測試模式] 密碼已模擬更新成功！");
                window.location.href = "index.html";
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> 正在寫入資料庫...`;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(targetUsername)}`, {
                    method: "PATCH",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ password: newPass })
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(errText);
                }

                alert(`🎉 工號 [${targetUsername}] 密碼變更成功！`);
                window.location.href = "index.html";

            } catch (err) {
                alert(`❌ 變更失敗：無法連線至雲端伺服器\n技術錯誤資訊: ${err.message}`);
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> 儲存並更新密碼`;
            }
        }
    </script>
</body>
</html>
