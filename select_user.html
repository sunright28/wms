<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 WMS 自建系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f7f6; }
        h1 { color: #333; }
        button { padding: 10px 15px; font-size: 16px; background-color: #00b4d8; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #0077b6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #0077b6; color: white; }
    </style>
</head>
<body>

    <h1>🚀 現場員工名單 (自建網頁測試)</h1>
    <button onclick="fetchEmployees()">⚡ 點我從 Supabase 抓取最新名單</button>

    <table id="employeeTable">
        <thead>
            <tr>
                <th>帳號 (Username)</th>
                <th>顯示名稱 (Display Name)</th>
                <th>權限 (Role)</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan='3'>目前沒有資料，請點擊上方按鈕抓取。</td></tr>
        </tbody>
    </table>

    <script>
        // =======================================================
        // 🎯 請填入您截圖中的專案資訊
        // =======================================================
        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14"; 
        // =======================================================

        // ⭕ 已修正的初始化連線語法（去掉了 @ 符號）
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ⭕ 確保結構完美閉合的異步抓取函式
        async function fetchEmployees() {
            const tbody = document.querySelector("#employeeTable tbody");
            tbody.innerHTML = "<tr><td colspan='3'>連線中，請稍候...</td></tr>";

            try {
                // 向 Supabase 的 users 資料表撈取資料
                const response = await db
                    .from('users')
                    .select('username, display_name, role');

                const users = response.data;
                const error = response.error;

                if (error) {
                    tbody.innerHTML = `<tr><td colspan='3' style='color:red;'>撈取失敗: ${error.message}</td></tr>`;
                    return;
                }

                // 如果沒撈到任何東西
                if (!users || users.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='3'>資料庫目前是空的，或是被 RLS 擋住了！</td></tr>";
                    return;
                }

                // 清空表格並動態渲染畫面
                tbody.innerHTML = "";
                users.forEach(function(user) {
                    const row = `<tr>
                        <td>${user.username}</td>
                        <td>${user.display_name || '未填寫'}</td>
                        <td>${user.role}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan='3' style='color:red;'>程式執行發生未預期錯誤: ${err.message}</td></tr>`;
            }
        }
    </script>
</body>
</html>
