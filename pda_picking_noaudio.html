<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS PDA 行動安全撿貨系統 (三層完美通車版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-red {
            0%, 100% { border-color: #ef4444; background-color: #fef2f2; }
            50% { border-color: #b91c1c; background-color: #fee2e2; }
        }
        .error-flash {
            animation: pulse-red 0.4s ease-in-out 3;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased select-none">

    <header id="app-header" class="hidden bg-blue-700 text-white shadow-md sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-barcode-read text-xl"></i>
            <h1 class="text-lg font-bold tracking-wider">PDA 安全撿貨</h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="user-badge" class="text-xs bg-blue-800 border border-blue-600 px-2 py-1 rounded font-mono"></span>
            <button onclick="logout()" class="text-blue-200 hover:text-white text-sm"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </header>

    <main class="p-3 max-w-md mx-auto">

        <div id="page-login" class="bg-white rounded-2xl shadow-lg p-6 mt-6 space-y-5 border border-gray-200">
            <div class="text-center space-y-1">
                <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto text-2xl">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h2 class="text-xl font-bold">WMS 安全驗證登入</h2>
                <p class="text-xs text-gray-400">請輸入或掃描人員工號與密碼</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">作業員工號 (Username)</label>
                    <input type="text" id="login-user" class="w-full text-center text-base font-mono tracking-wider border-2 border-gray-200 rounded-xl p-2.5 focus:border-blue-500 focus:outline-none" placeholder="輸入工號 (如: OP001)">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">驗證密碼 (Password)</label>
                    <input type="password" id="login-pass" class="w-full text-center text-base font-mono tracking-wider border-2 border-gray-200 rounded-xl p-2.5 focus:border-blue-500 focus:outline-none" placeholder="輸入安全密碼">
                </div>
                
                <div id="login-err-msg" class="hidden text-center bg-red-50 border border-red-200 text-red-600 font-bold text-xs p-2.5 rounded-xl">
                    <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span id="login-err-text">工號或密碼錯誤，請重新輸入！</span>
                </div>

                <button onclick="loginVerify()" id="btn-login-submit" class="w-full bg-blue-600 active:bg-blue-800 text-white font-bold py-3.5 rounded-xl text-base shadow-md transition-all flex items-center justify-center gap-2">
                    <span>驗證登入</span> <i class="fa-solid fa-key text-sm"></i>
                </button>
            </div>
        </div>

        <div id="page-orders" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-700">
                    <i class="fa-solid fa-list-check"></i> 請選擇出貨波次
                </h2>
                <button onclick="loadOrders()" class="bg-white border border-gray-300 active:bg-gray-100 p-2 rounded-lg text-gray-600 shadow-xs flex items-center justify-center gap-1 px-3 py-1.5 text-xs font-bold">
                    <i id="refresh-icon" class="fa-solid fa-arrow-rotate-right"></i> 重新整理
                </button>
            </div>

            <div id="api-error-card" class="hidden bg-red-50 border border-red-200 rounded-xl p-4 space-y-2">
                <p class="text-sm font-bold text-red-600 flex items-center gap-1">
                    <i class="fa-solid fa-circle-exclamation"></i> 聯絡雲端資料庫時發生技術錯誤
                </p>
                <div id="api-error-text" class="text-xs text-red-500 bg-white p-2.5 border border-red-100 rounded-md font-mono overflow-x-auto"></div>
            </div>

            <div id="loader-orders" class="hidden text-center py-8 space-y-2">
                <div class="inline-block animate-spin rounded-full h-6 w-6 border-3 border-blue-600 border-t-transparent"></div>
                <p class="text-xs text-gray-400">正在同步未完工波次...</p>
            </div>

            <div id="order-list" class="space-y-3"></div>
        </div>

        <div id="page-picking" class="hidden space-y-3">
            
            <div class="flex items-center justify-between">
                <button onclick="backToOrders()" class="bg-gray-200 active:bg-gray-300 text-gray-700 px-3 py-2 rounded-xl text-sm font-bold">
                    <i class="fa-solid fa-chevron-left"></i> 返回清單
                </button>
                <span class="bg-amber-100 text-amber-800 border border-amber-200 px-3 py-1 rounded-full text-xs font-bold animate-pulse">
                    <i class="fa-solid fa-thumbtack"></i> 撿貨執行中
                </span>
            </div>

            <div class="bg-gradient-to-br from-gray-800 to-gray-900 text-white rounded-2xl p-4 shadow-md space-y-3">
                <div class="flex justify-between items-start border-b border-gray-700 pb-2">
                    <div>
                        <p class="text-xs text-gray-400 font-medium">棧板單號</p>
                        <h3 class="text-xl font-mono font-bold tracking-tight" id="lbl-pallet-no">-</h3>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400 font-medium">出貨廠商</p>
                        <span class="text-sm font-bold bg-blue-900/50 text-blue-300 px-2 py-0.5 rounded border border-blue-700" id="lbl-vendor">-</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-gray-800/50 p-2 rounded-lg border border-gray-700">
                        <p class="text-[10px] text-gray-400">出貨日期</p>
                        <p class="text-xs font-bold mt-0.5" id="lbl-date">-</p>
                    </div>
                    <div class="bg-gray-800/50 p-2 rounded-lg border border-gray-700">
                        <p class="text-[10px] text-gray-400">棧板總重</p>
                        <p class="text-xs font-bold mt-0.5 text-blue-300" id="lbl-weight">-</p>
                    </div>
                    <div class="bg-gray-800/50 p-2 rounded-lg border border-gray-700">
                        <p class="text-[10px] text-gray-400">總材積</p>
                        <p class="text-xs font-bold mt-0.5" id="lbl-cubic">-</p>
                    </div>
                    <div class="bg-gray-800/50 p-2 rounded-lg border border-gray-700 col-span-1">
                        <p class="text-[10px] text-gray-400">容積佔比</p>
                        <p class="text-xs font-bold mt-0.5 text-amber-400" id="lbl-ratio">-</p>
                    </div>
                    <div class="bg-gray-800/50 p-2 rounded-lg border border-gray-700 col-span-2">
                        <p class="text-[10px] text-gray-400">主單總件數</p>
                        <p class="text-xs font-bold mt-0.5 text-green-400" id="lbl-pieces">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-blue-50 border border-blue-200 rounded-xl p-2.5 flex items-center gap-2 shadow-xs">
                <div class="text-blue-600 animate-pulse shrink-0 pl-1">
                    <i class="fa-solid fa-expand text-base"></i>
                </div>
                <input type="text" id="pda-scan-input" 
                       class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm font-mono focus:outline-none focus:border-blue-600 shadow-inner" 
                       placeholder="請直接使用 PDA 掃描物料條碼...">
            </div>

            <p class="text-xs font-bold text-gray-500 px-1 flex justify-between">
                <span>💡 排序：單位重量(大➔小) + 品項效期FIFO</span>
                <span class="text-blue-600 font-mono">順序: #1 ➔ #4 升序</span>
            </p>

            <div id="loader-items" class="hidden text-center py-8 space-y-2">
                <div class="inline-block animate-spin rounded-full h-6 w-6 border-3 border-blue-600 border-t-transparent"></div>
                <p class="text-xs text-gray-400">正在運算 FIFO 優先度明細...</p>
            </div>

            <div id="item-list" class="space-y-3 pb-6"></div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14";

        let currentPickerTableId = null; 
        let currentPickerId = "";        
        let currentPickerName = "";      
        
        let activePalletObject = null;   
        let currentPalletItems = [];
        let currentPalletId = null;

        // 🔐 登入驗證
        async function loginVerify() {
            const userField = document.getElementById("login-user");
            const passField = document.getElementById("login-pass");
            const errMsg = document.getElementById("login-err-msg");
            const errText = document.getElementById("login-err-text");
            const btnSubmit = document.getElementById("btn-login-submit");

            const username = userField.value.trim();
            const password = passField.value.trim();

            if (!username || !password) {
                alert("工號與密碼皆不能留空！");
                return;
            }

            errMsg.classList.add("hidden");
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div> <span>驗證中...</span>`;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(username)}&select=*`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });

                if (!response.ok) {
                    const dbErr = await response.text();
                    throw new Error(`DB_ERR: ${dbErr}`);
                }
                
                const usersFound = await response.json();

                if (usersFound.length > 0 && String(usersFound[0].password) === String(password)) {
                    const userRawData = usersFound[0];
                    
                    currentPickerTableId = parseInt(userRawData.id) || null; 
                    currentPickerId = username; 
                    currentPickerName = userRawData.display_name || userRawData.name || username;
                    
                    document.getElementById("user-badge").innerText = `👤 ${currentPickerName}`;
                    document.getElementById("page-login").classList.add("hidden");
                    document.getElementById("app-header").classList.remove("hidden");
                    document.getElementById("page-orders").classList.remove("hidden");
                    
                    passField.value = "";
                    loadOrders(); 
                } else {
                    throw new Error("AUTH_FAILED");
                }

            } catch (err) {
                errMsg.classList.remove("hidden");
                if (err.message.startsWith("DB_ERR:")) {
                    errText.innerText = `資料庫錯誤: ${err.message.replace("DB_ERR:", "")}`;
                } else {
                    errText.innerText = "工號或密碼錯誤，請重新輸入！";
                }
                passField.value = "";
                passField.focus();
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<span>驗證登入</span> <i class="fa-solid fa-key text-sm"></i>`;
            }
        }

        document.getElementById("login-pass").addEventListener("keyup", (e) => {
            if (e.key === "Enter") loginVerify();
        });

        function logout() {
            currentPickerTableId = null;
            currentPickerId = "";
            currentPickerName = "";
            document.getElementById("page-login").classList.remove("hidden");
            document.getElementById("app-header").classList.add("hidden");
            document.getElementById("page-orders").classList.add("hidden");
            document.getElementById("page-picking").classList.add("hidden");
            document.getElementById("login-user").focus();
        }

        // 🔄 【第一層】載入訂單波次清單
        async function loadOrders() {
            const container = document.getElementById("order-list");
            const loader = document.getElementById("loader-orders");
            const icon = document.getElementById("refresh-icon");
            const errCard = document.getElementById("api-error-card");
            
            container.innerHTML = "";
            errCard.classList.add("hidden");
            loader.classList.remove("hidden");
            if (icon) icon.classList.add("animate-spin");

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?order=id.asc`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                
                if (!response.ok) {
                    const errDetail = await response.text();
                    throw new Error(errDetail);
                }
                
                const allOrders = await response.json();

                const activeOrders = allOrders.filter(order => {
                    const picked = parseInt(order.pallets_picked) || 0;
                    const total = parseInt(order.total_pallets) || 0;
                    return picked < total;
                });

                if (activeOrders.length === 0) {
                    container.innerHTML = `<div class="text-center py-12 text-gray-400 italic bg-white rounded-xl border border-dashed border-gray-300">🎉 目前沒有待處理的未完工波次！</div>`;
                    return;
                }

                activeOrders.forEach((order) => {
                    const card = document.createElement("div");
                    card.className = "bg-white rounded-xl shadow-xs border border-gray-200 overflow-hidden";
                    card.innerHTML = `
                        <div onclick="toggleOrderGroup(${order.id})" class="p-4 bg-white active:bg-gray-50 flex justify-between items-center cursor-pointer border-b border-gray-100">
                            <div class="space-y-0.5">
                                <div class="flex items-center gap-2">
                                    <span class="bg-gray-800 text-white font-mono text-[11px] font-bold px-1.5 py-0.5 rounded">波次</span>
                                    <h4 class="font-bold text-base text-gray-800">${order.order_no || "未命名波次"}</h4>
                                </div>
                                <p class="text-xs text-gray-500 font-medium"><i class="fa-solid fa-truck-ramp-box text-gray-400"></i> 客戶: ${order.ship_vendor || "未知廠商"}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="bg-blue-50 text-blue-600 font-mono text-xs font-bold px-2 py-1 rounded-md border border-blue-100">
                                    進度: ${order.pallets_picked || 0} / ${order.total_pallets || 0} 板
                                </span>
                                <i id="arrow-${order.id}" class="fa-solid fa-chevron-down text-gray-400 transition-transform"></i>
                            </div>
                        </div>
                        <div id="sub-pallets-${order.id}" class="hidden bg-gray-50/50 divide-y divide-gray-100">
                            <div class="p-4 text-center text-xs text-gray-400"><i class="fa-solid fa-spinner animate-spin"></i> 正在連線查閱所有棧板...</div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                errCard.classList.remove("hidden");
                document.getElementById("api-error-text").innerText = err.message;
            } finally {
                if (loader) loader.classList.add("hidden");
                if (icon) icon.classList.remove("animate-spin");
            }
        }

        // 📂 【第二層】動態抓取該單據下的所有棧板
        async function toggleOrderGroup(orderId) {
            const subBox = document.getElementById(`sub-pallets-${orderId}`);
            const arrow = document.getElementById(`arrow-${orderId}`);
            
            if (!subBox || !arrow) return;

            const isHidden = subBox.classList.contains("hidden");
            subBox.classList.toggle("hidden");
            arrow.classList.toggle("rotate-180");

            if (isHidden) {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?order_id=eq.${orderId}&order=id.asc`, {
                        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                    });
                    
                    if (!response.ok) throw new Error("撈取關聯棧板失敗");
                    const childPallets = await response.json();

                    subBox.innerHTML = ""; 
                    
                    if (childPallets.length === 0) {
                        subBox.innerHTML = `<div class="p-3 text-center text-xs text-gray-400 italic">⚠️ 本波次單據底下無配置任何棧板</div>`;
                        return;
                    }

                    childPallets.forEach(p => {
                        const row = document.createElement("div");
                        row.onclick = () => {
                            activePalletObject = p; 
                            startPicking(p.id);
                        };
                        row.className = "p-3.5 flex justify-between items-center active:bg-blue-50/50 cursor-pointer transition-colors";
                        
                        let badgeColor = "bg-gray-200 text-gray-600 border-gray-300";
                        if (p.status === "待撿貨" || !p.status) badgeColor = "bg-amber-100 text-amber-900 border-amber-200";
                        if (p.status === "撿貨中") badgeColor = "bg-blue-100 text-blue-900 border-blue-200 animate-pulse";
                        if (p.status === "已完成") badgeColor = "bg-green-100 text-green-900 border-green-200";
                        
                        row.innerHTML = `
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-white border border-gray-200 flex items-center justify-center text-gray-500 text-sm shadow-2xs">
                                    <i class="fa-solid fa-pallet text-amber-600"></i>
                                </div>
                                <div>
                                    <p class="font-mono text-sm font-bold text-gray-700">${p.pallet_no || '未編號'}</p>
                                    <p class="text-[11px] text-gray-400">規格: ${p.total_pieces || 0}件 / ${p.total_weight || 0}kg</p>
                                </div>
                            </div>
                            <span class="text-xs font-bold px-2.5 py-1 rounded-md border shadow-2xs ${badgeColor}">
                                ${p.status || '待撿貨'} <i class="fa-solid fa-chevron-right text-[9px] ml-0.5"></i>
                            </span>
                        `;
                        subBox.appendChild(row);
                    });

                } catch (err) {
                    subBox.innerHTML = `<div class="p-3 text-xs text-red-500 bg-red-50 font-mono">❌ 讀取失敗: ${err.message}</div>`;
                }
            }
        }

        // 🎯 【第三層】進入明細撿貨頁面
        async function startPicking(palletId) {
            currentPalletId = palletId;
            const pInfo = activePalletObject;
            if(!pInfo) return;

            document.getElementById("lbl-pallet-no").innerText = pInfo.pallet_no || "-";
            document.getElementById("lbl-vendor").innerText = pInfo.ship_vendor || "未指定";
            document.getElementById("lbl-date").innerText = pInfo.ship_date || "-";
            document.getElementById("lbl-weight").innerText = `${pInfo.total_weight || 0} kg`;
            document.getElementById("lbl-cubic").innerText = `${pInfo.total_cubic || 0} 材`;
            document.getElementById("lbl-ratio").innerText = `${Math.round((pInfo.space_ratio || 0) * 100)} %`;
            document.getElementById("lbl-pieces").innerText = `${pInfo.total_pieces || 0} 件`;

            document.getElementById("page-orders").classList.add("hidden");
            document.getElementById("page-picking").classList.remove("hidden");

            const listContainer = document.getElementById("item-list");
            const loader = document.getElementById("loader-items");
            listContainer.innerHTML = "";
            if (loader) loader.classList.remove("hidden");

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pallet_items?order_pallet_id=eq.${palletId}&select=*`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                if (!response.ok) throw new Error("物料明細撈取失敗");
                const rawItems = await response.json();

                rawItems.sort((a, b) => {
                    const weightA = parseFloat(a.unit_weight) || 0;
                    const weightB = parseFloat(b.unit_weight) || 0;
                    if (weightB !== weightA) {
                        return weightB - weightA;
                    } else {
                        const dateA = a.exp_date || "9999-12-31";
                        const dateB = b.exp_date || "9999-12-31";
                        return dateA.localeCompare(dateB);
                    }
                });

                currentPalletItems = rawItems.map(item => ({
                    ...item,
                    qty_picked_pcs: parseInt(item.qty_picked_pcs) || 0 
                }));

                currentPalletItems.forEach((item, index) => {
                    const itemCard = document.createElement("div");
                    itemCard.id = `picker-row-${index}`;
                    
                    const targetPcs = parseInt(item.qty_target_pcs) || 0;
                    const isDone = item.qty_picked_pcs >= targetPcs && targetPcs > 0;
                    
                    // 🔴 如果無效期，設定亮橘色背景防呆提示
                    const hasNoExp = !item.exp_date || item.exp_date.trim() === "" || item.exp_date === "-" || item.exp_date.includes("請先設定");
                    
                    if (isDone) {
                        itemCard.className = "bg-white rounded-xl shadow-xs border border-green-500 bg-green-50/20 opacity-50 p-4 space-y-3 relative overflow-hidden transition-all duration-300";
                    } else if (hasNoExp) {
                        itemCard.className = "bg-amber-50/60 rounded-xl shadow-xs border border-amber-300 p-4 space-y-3 relative overflow-hidden transition-all duration-300";
                    } else {
                        itemCard.className = "bg-white rounded-xl shadow-xs border border-gray-200 p-4 space-y-3 relative overflow-hidden transition-all duration-300";
                    }
                    
                    const hasExp = !hasNoExp;
                    let expHtml = "";

                    if (hasExp) {
                        expHtml = `
                            <span class="text-xs text-gray-500 font-medium"><i class="fa-solid fa-clock-rotate-left"></i> 產品效期:</span>
                            <span class="text-sm font-mono text-red-600 font-bold">${item.exp_date}</span>
                        `;
                    } else {
                        expHtml = `
                            <div class="flex items-center gap-2 w-full">
                                <span class="text-xs text-red-600 font-bold shrink-0 animate-pulse"><i class="fa-solid fa-triangle-exclamation"></i> 請設定效期:</span>
                                <input type="date" id="input-exp-${item.id}" class="text-xs border border-amber-300 rounded px-1.5 py-1 focus:outline-none focus:border-blue-500 font-mono bg-white grow">
                                <button onclick="updateExpiry(${item.id}, ${index})" id="btn-save-exp-${item.id}" class="bg-amber-600 active:bg-amber-700 text-white text-xs font-bold px-2.5 py-1.5 rounded shadow-xs shrink-0 flex items-center gap-1">
                                    <i class="fa-solid fa-floppy-disk"></i> 儲存
                                </button>
                            </div>
                        `;
                    }

                    let progressBoxClass = "text-center bg-gray-100 p-1.5 rounded-lg border border-gray-300";
                    let countTextClass = "text-blue-600";
                    let btnHtml = `<i class="fa-solid fa-plus-circle"></i> 手動點收一件 (+1)`;
                    let btnClass = "w-full mt-2 bg-gray-800 active:bg-blue-700 text-white font-bold py-2.5 rounded-xl text-sm shadow-sm flex items-center justify-center gap-1 transition-colors";
                    let btnAction = `onclick="addPickCount(${index})"`;

                    if (isDone) {
                        progressBoxClass = "text-center bg-green-100 p-1.5 rounded-lg border border-green-300 text-green-800";
                        countTextClass = "text-green-700 font-black";
                        btnHtml = `<i class="fa-solid fa-circle-check"></i> 本品項已全數點收`;
                        btnClass = "w-full mt-2 bg-green-600 text-white font-bold py-2.5 rounded-xl text-sm shadow-sm flex items-center justify-center gap-1 cursor-not-allowed";
                        btnAction = "";
                    }

                    let itemStatusBadge = `<span id="item-status-badge-${index}" class="text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-gray-100 text-gray-500">${item.status || '待撿貨'}</span>`;
                    if (item.status === "撿貨中") {
                        itemStatusBadge = `<span id="item-status-badge-${index}" class="text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-blue-100 text-blue-700">撿貨中</span>`;
                    } else if (item.status === "已完成" || isDone) {
                        itemStatusBadge = `<span id="item-status-badge-${index}" class="text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-green-100 text-green-700">已完成</span>`;
                    }

                    itemCard.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-1.5">
                                <span class="text-[11px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded font-mono font-bold">項次 ${item.line_no || '001'}</span>
                                ${itemStatusBadge}
                            </div>
                            <span class="text-xs bg-blue-50 text-blue-700 font-mono font-bold px-2 py-0.5 rounded border border-blue-100">單箱重: ${item.unit_weight || 0} kg</span>
                        </div>
                        
                        <div class="space-y-0.5">
                            <p class="text-xs font-mono tracking-wide text-gray-400 font-bold">${item.item_no || '-'}</p>
                            <h4 class="text-base font-black text-gray-900 tracking-tight leading-tight">${item.item_name || '-'}</h4>
                        </div>

                        <div id="exp-block-${item.id}" class="bg-gray-50 p-2 rounded-lg flex justify-between items-center border border-gray-100">
                            ${expHtml}
                        </div>

                        <div class="grid grid-cols-3 gap-2 pt-1">
                            <div class="text-center bg-blue-50/50 p-1.5 rounded-lg border border-blue-100/60">
                                <p class="text-[10px] text-blue-500 font-medium">預計撿貨數</p>
                                <p class="text-sm font-black font-mono text-blue-700 mt-0.5">${item.qty_target_text || '0'}</p>
                            </div>
                            <div class="text-center bg-gray-50 p-1.5 rounded-lg">
                                <p class="text-[10px] text-gray-400 font-medium">訂單原始數</p>
                                <p class="text-sm font-bold font-mono text-gray-600 mt-0.5">${item.qty_order_text || '0'}</p>
                            </div>
                            <div id="progress-box-${index}" class="${progressBoxClass}">
                                <p class="text-[10px] text-gray-500 font-medium">點收進度</p>
                                <p class="text-sm font-black font-mono mt-0.5">
                                    <span id="picked-pcs-${index}" class="${countTextClass}">${item.qty_picked_pcs}</span> 
                                    <span class="text-gray-400">/</span> 
                                    <span class="text-gray-800">${targetPcs} 件</span>
                                </p>
                            </div>
                        </div>

                        <button id="btn-check-${index}" ${btnAction} class="${btnClass}">
                            ${btnHtml}
                        </button>
                    `;
                    listContainer.appendChild(itemCard);
                });

                if(rawItems.length === 0) {
                    listContainer.innerHTML = `<div class="text-center py-12 text-gray-400 italic">此棧板無明細資料</div>`;
                }

                focusScanInput();

            } catch (err) {
                alert(err.message);
                backToOrders();
            } finally {
                if (loader) loader.classList.add("hidden");
            }
        }

        // 💾 效期回存
        async function updateExpiry(itemId, index) {
            const dateInput = document.getElementById(`input-exp-${itemId}`);
            const btnSave = document.getElementById(`btn-save-exp-${itemId}`);
            const expBlock = document.getElementById(`exp-block-${itemId}`);
            const selectedDate = dateInput.value;

            if (!selectedDate) {
                alert("請先選擇有效的效期日期！");
                return;
            }

            dateInput.disabled = true;
            btnSave.disabled = true;
            const originalHtml = btnSave.innerHTML;
            btnSave.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i>`;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/pallet_items?id=eq.${itemId}`, {
                    method: "PATCH",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ exp_date: selectedDate })
                });

                if (!response.ok) throw new Error("雲端資料庫更新效期失敗");

                if (currentPalletItems[index]) {
                    currentPalletItems[index].exp_date = selectedDate;
                }

                expBlock.innerHTML = `
                    <span class="text-xs text-gray-500 font-medium"><i class="fa-solid fa-clock-rotate-left"></i> 產品效期:</span>
                    <span class="text-sm font-mono text-red-600 font-bold">${selectedDate}</span>
                `;

                // 移除高亮底色，恢復正常外框
                const card = document.getElementById(`picker-row-${index}`);
                if (card) {
                    card.className = "bg-white rounded-xl shadow-xs border border-gray-200 p-4 space-y-3 relative overflow-hidden transition-all duration-300";
                }

            } catch (error) {
                alert(`❌ 儲存失敗！\n原因：${error.message}`);
                dateInput.disabled = false;
                btnSave.disabled = false;
                btnSave.innerHTML = originalHtml;
            } finally {
                focusScanInput();
            }
        }

        // 💡 核心回存機制
        async function addPickCount(index) {
            const item = currentPalletItems[index];
            if (!item) return;

            // 🛡️ 【關鍵核心防呆點 1】：手動累加時阻斷無效期品項
            const hasNoExp = !item.exp_date || item.exp_date.trim() === "" || item.exp_date === "-" || item.exp_date.includes("請先設定");
            if (hasNoExp) {
                playBeep(180, 0.4); // 警報音
                alert(`⚠️ 安全阻斷：品項 [ ${item.item_no || '此商品'} ] 尚未設定效期！\n\n必須先於卡片中選擇日期並點擊【儲存】，系統才會解鎖並開放點收撿貨。`);
                
                const cardEl = document.getElementById(`picker-row-${index}`);
                if (cardEl) {
                    cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    cardEl.classList.add("error-flash");
                    setTimeout(() => cardEl.classList.remove("error-flash"), 1200);
                }
                return; // 直接截斷不累加
            }

            const targetPcs = parseInt(item.qty_target_pcs) || 0;
            if (item.qty_picked_pcs >= targetPcs) return;

            const pInfo = activePalletObject;
            
            if (pInfo && pInfo.status !== "撿貨中") {
                const nowISO = new Date().toISOString();
                pInfo.status = "撿貨中";
                pInfo.start_time = nowISO;
                pInfo.picker_id = currentPickerTableId; 

                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?id=eq.${currentPalletId}`, {
                        method: "PATCH",
                        headers: {
                            "apikey": SUPABASE_KEY,
                            "Authorization": `Bearer ${SUPABASE_KEY}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            start_time: nowISO,
                            picker_id: currentPickerTableId,
                            status: "撿貨中"
                        })
                    });
                } catch (e) {
                    console.error("❌ 棧板單據狀態同步失敗:", e);
                }
            }

            item.qty_picked_pcs += 1;
            let nextItemStatus = item.qty_picked_pcs === targetPcs ? "已完成" : "撿貨中";
            item.status = nextItemStatus; 

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/pallet_items?id=eq.${item.id}`, {
                    method: "PATCH",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ 
                        qty_picked_pcs: item.qty_picked_pcs,
                        status: nextItemStatus 
                    })
                });
            } catch (err) {
                console.error(`❌ 明細 API 連線異常:`, err);
            }

            const card = document.getElementById(`picker-row-${index}`);
            const countText = document.getElementById(`picked-pcs-${index}`);
            const progressBox = document.getElementById(`progress-box-${index}`);
            const btn = document.getElementById(`btn-check-${index}`);
            const badge = document.getElementById(`item-status-badge-${index}`);

            if (countText) countText.innerText = item.qty_picked_pcs;

            if (badge) {
                badge.className = nextItemStatus === "已完成" ? "text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-green-100 text-green-700" : "text-[10px] px-1.5 py-0.5 rounded-md font-bold bg-blue-100 text-blue-700";
                badge.innerText = nextItemStatus;
            }

            if (item.qty_picked_pcs === targetPcs) {
                playBeep(1200, 0.15); 
                if (card) {
                    card.className = "bg-white rounded-xl shadow-xs border border-green-500 bg-green-50/20 opacity-50 p-4 space-y-3 relative overflow-hidden transition-all duration-300";
                }
                if (progressBox) {
                    progressBox.className = "text-center bg-green-100 p-1.5 rounded-lg border border-green-300 text-green-800";
                }
                if (countText) countText.className = "text-green-700 font-black";
                if (btn) {
                    btn.className = "w-full mt-2 bg-green-600 text-white font-bold py-2.5 rounded-xl text-sm shadow-sm flex items-center justify-center gap-1 cursor-not-allowed";
                    btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> 本品項已全數點收`;
                    btn.onclick = null;
                }

                checkAllItemsCompleted();
            } else {
                playBeep(900, 0.05); 
                if (progressBox) progressBox.className = "text-center bg-blue-50 p-1.5 rounded-lg border border-blue-400";
                if (countText) countText.className = "text-blue-600 font-black text-base animate-pulse";
            }
        }

        // 💡 檢查結案與主單連動
        function checkAllItemsCompleted() {
            const isAllDone = currentPalletItems.every(item => item.status === "已完成");

            if (isAllDone && currentPalletId) {
                const nowISO = new Date().toISOString();

                fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?id=eq.${currentPalletId}`, {
                    method: "PATCH",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ end_time: nowISO, status: "已完成" })
                })
                .then(async (res) => {
                    if(!res.ok) throw new Error("棧板結案寫入失敗");
                    
                    if (activePalletObject && activePalletObject.order_id) {
                        try {
                            const checkPalletsRes = await fetch(`${SUPABASE_URL}/rest/v1/pallet_orders?order_id=eq.${activePalletObject.order_id}`, {
                                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                            });
                            const allPalletsOfThisOrder = await checkPalletsRes.json();
                            const totalCompletedCount = allPalletsOfThisOrder.filter(p => p.status === "已完成").length;
                            
                            await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${activePalletObject.order_id}`, {
                                method: "PATCH",
                                headers: {
                                    "apikey": SUPABASE_KEY,
                                    "Authorization": `Bearer ${SUPABASE_KEY}`,
                                    "Content-Type": "application/json"
                                },
                                body: JSON.stringify({ pallets_picked: totalCompletedCount })
                            });
                        } catch (errOrder) {
                            console.error("同步主單波次進度失敗:", errOrder);
                        }
                    }

                    setTimeout(() => {
                        alert("🎉 太棒了！本棧板所有品項已全數點收完畢，單據已自動結案！");
                        backToOrders();
                    }, 500);
                })
                .catch(err => console.error("主單結案回存失敗:", err));
            }
        }

        function backToOrders() {
            document.getElementById("page-orders").classList.remove("hidden");
            document.getElementById("page-picking").classList.add("hidden");
            loadOrders(); 
        }

        function focusScanInput() {
            setTimeout(() => {
                const scanInput = document.getElementById("pda-scan-input");
                if (scanInput && !document.getElementById("page-picking").classList.contains("hidden")) {
                    scanInput.value = "";
                    scanInput.focus();
                }
            }, 200);
        }

        document.addEventListener("click", (e) => {
            const scanInput = document.getElementById("pda-scan-input");
            if (scanInput && !document.getElementById("page-picking").classList.contains("hidden")) {
                if (e.target.tagName !== "INPUT" && e.target.tagName !== "BUTTON" && !e.target.closest("button")) {
                    scanInput.focus();
                }
            }
        });

        document.addEventListener("keyup", (e) => {
            const scanInput = document.getElementById("pda-scan-input");
            if (!scanInput || document.getElementById("page-picking").classList.contains("hidden")) return;

            if (e.key === "Enter") {
                const barcode = scanInput.value.trim();
                scanInput.value = "";
                if (!barcode) return;

                let foundIndex = -1;
                for (let i = 0; i < currentPalletItems.length; i++) {
                    const item = currentPalletItems[i];
                    const targetPcs = parseInt(item.qty_target_pcs) || 0;
                    if (item.item_no === barcode && item.qty_picked_pcs < targetPcs) {
                        foundIndex = i;
                        break; 
                    }
                }

                if (foundIndex !== -1) {
                    // 🛡️ 【關鍵核心防呆點 2】：PDA 掃描條碼時，如果是無效期商品，同樣調用 addPickCount 觸發阻斷
                    addPickCount(foundIndex);
                } else {
                    playBeep(300, 0.3); 
                    alert(`⚠️ 條碼 [${barcode}] 比對失敗！\n該品項可能已點收全滿，或本棧板無此品項。`);
                }
                scanInput.focus();
            }
        });

        function playBeep(frequency, duration) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = frequency > 500 ? "sine" : "sawtooth";
                osc.frequency.value = frequency;
                osc.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch (err) { }
        }
    </script>
</body>
