<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS 核心營運文件下載專區</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen p-4 md:p-8 flex items-center justify-center">
    <script>
        // 貼在 5 個子網頁 body 下方第一個 <script> 最頂端
        let CURRENT_USER_ID = "";
        let CURRENT_USER_ROLE = "";
        let CURRENT_USER_NAME = "";
        let CURRENT_USER_TABLE_ID = null; // 🌟【關鍵新增】：儲存 users 資料表的數字 id

        (function() {
            const cachedData = sessionStorage.getItem("currentUser");
            
            if (!cachedData) {
                alert("🚨 安全警告：偵測到非法存取！請先從主系統登入驗證。");
                window.location.href = "index.html";
                return;
            }

            try {
                const userObj = JSON.parse(cachedData);
                
                // 🌟 精確提取變數，包含最核心的數字 id
                CURRENT_USER_TABLE_ID = userObj.id ? parseInt(userObj.id) : null; // 👈 提取數字 ID
                CURRENT_USER_ID = userObj.username;                    // 帳號/工號字串
                CURRENT_USER_ROLE = userObj.role ? userObj.role.trim().toLowerCase() : "user"; // 權限角色
                CURRENT_USER_NAME = userObj.display_name;              // 顯示姓名
            } catch (e) {
                sessionStorage.removeItem("currentUser");
                window.location.href = "index.html";
            }
        })();
    </script>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(6,182,212,0.15),transparent_45%)] pointer-events-none"></div>

    <div class="max-w-xl w-full space-y-6 relative z-10">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-800/60 p-4 rounded-2xl border border-slate-700/50 gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-cyan-500/20 text-cyan-400 p-3 rounded-xl border border-cyan-500/30">
                    <i class="fa-solid fa-cloud-arrow-down text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-base font-black tracking-wider text-slate-100">核心營運文件下載</h1>
                    <p class="text-xs text-slate-400">登入者：<span id="user-display" class="text-cyan-400 font-mono font-bold">驗證中...</span></p>
                </div>
            </div>
            <button onclick="window.location.replace('index.html')" class="text-xs bg-slate-700/50 hover:bg-slate-700 px-3 py-2 rounded-xl text-slate-300 hover:text-white font-medium transition-all cursor-pointer flex items-center">
                <i class="fa-solid fa-arrow-left mr-1"></i> 回主選單
            </button>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700/60 shadow-xl space-y-4">
            <h2 class="text-xs font-bold text-slate-400 tracking-wider mb-2 flex items-center gap-1.5">
                <i class="fa-solid fa-file-shield text-cyan-400"></i> 請選擇欲下載的系統或主檔資料
            </h2>

            <div class="space-y-3" id="download-list">

                <a id="link-local" href="#" download class="flex items-center gap-4 bg-slate-900/60 hover:bg-slate-900 p-4 rounded-xl border border-slate-800 hover:border-cyan-500/40 shadow-sm transition-all group cursor-pointer">
                    <div class="bg-amber-500/10 text-amber-400 p-3 rounded-xl group-hover:scale-105 transition-transform">
                        <i class="fa-regular fa-file-excel text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="text-sm font-bold text-slate-200 group-hover:text-cyan-400 transition-colors truncate">1. 單機作業排板系統</h3>
                        <p id="text-local" class="text-[11px] text-yellow-500 font-mono mt-0.5 truncate">🔍 正在尋找最新 Local 檔案...</p>
                    </div>
                    <div class="text-slate-600 group-hover:text-cyan-400 transition-all px-2 text-xs font-semibold flex items-center gap-1">
                        <span>下載</span> <i class="fa-solid fa-download animate-pulse"></i>
                    </div>
                </a>

                <a id="link-cloud" href="#" download class="flex items-center gap-4 bg-slate-900/60 hover:bg-slate-900 p-4 rounded-xl border border-slate-800 hover:border-cyan-500/40 shadow-sm transition-all group cursor-pointer">
                    <div class="bg-emerald-500/10 text-emerald-400 p-3 rounded-xl group-hover:scale-105 transition-transform">
                        <i class="fa-regular fa-file-excel text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="text-sm font-bold text-slate-200 group-hover:text-cyan-400 transition-colors truncate">2. 產品雲端排板系統</h3>
                        <p id="text-cloud" class="text-[11px] text-yellow-500 font-mono mt-0.5 truncate">🔍 正在尋找最新 Cloud 檔案...</p>
                    </div>
                    <div class="text-slate-600 group-hover:text-cyan-400 transition-all px-2 text-xs font-semibold flex items-center gap-1">
                        <span>下載</span> <i class="fa-solid fa-download animate-pulse"></i>
                    </div>
                </a>

                <button id="btn-export-supabase" onclick="downloadSupabaseProducts()" class="w-full flex items-center gap-4 bg-slate-900/60 hover:bg-slate-900 p-4 rounded-xl border border-slate-800 hover:border-cyan-500/40 shadow-sm transition-all group cursor-pointer text-left">
                    <div class="bg-cyan-500/10 text-cyan-400 p-3 rounded-xl group-hover:scale-105 transition-transform">
                        <i class="fa-solid fa-database text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="text-sm font-bold text-slate-200 group-hover:text-cyan-400 transition-colors truncate">3. 產品主檔即時下載</h3>
                        <p id="export-status" class="text-[11px] text-slate-400 font-mono mt-0.5 truncate">從雲端即時串接轉換成 Excel 中文檔</p>
                    </div>
                    <div class="text-cyan-500 px-2 text-xs font-semibold flex items-center gap-1">
                        <span>匯出</span> <i class="fa-solid fa-file-export"></i>
                    </div>
                </button>

            </div>
        </div>

        <p class="text-center text-[11px] text-slate-600 font-mono">Secure Document Distribution Network | © 2026 WMS Control.</p>
    </div>

    <script>
        // 🌟 請在此處設定您的 GitHub 帳號與專案儲存庫名稱 🌟
        const GITHUB_OWNER = "sunright28"; 
        const GITHUB_REPO = "wms";   

        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14";

        const currentOperator = CURRENT_USER_NAME;
        const currentRole = CURRENT_USER_ROLE;

        document.addEventListener("DOMContentLoaded", async () => {
            // 顯示使用者名稱與職稱
            currentRole === 'admin' 
            ? document.getElementById("user-display").innerText = `${currentOperator} (系統管理員)` 
            : document.getElementById("user-display").innerText = CURRENT_USER_NAME;

            // 🎯 【核心自動化】連線 GitHub API 動態索取檔案清單，自動比對出最新日期
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/files`);
                if (!response.ok) throw new Error("GitHub API 回應異常");
                
                const fileList = await response.json();
                const xlsmFiles = fileList.filter(item => item.name.endsWith('.xlsm'));

                // 1. 自動撈取最新的 LOCAL 檔案 (依名稱降冪排序，日期越新如0705會排在0701前面)
                const localFiles = xlsmFiles.filter(item => item.name.toLowerCase().includes('local'));
                localFiles.sort((a, b) => b.name.localeCompare(a.name));
                
                if (localFiles.length > 0) {
                    const latestLocal = localFiles[0];
                    document.getElementById("link-local").href = latestLocal.download_url;
                    document.getElementById("text-local").innerText = `files/${latestLocal.name}`;
                    document.getElementById("text-local").className = "text-[11px] text-emerald-400 font-mono mt-0.5 truncate";
                } else {
                    document.getElementById("text-local").innerText = "❌ 找不到任何 Local 檔案";
                }

                // 2. 自動撈取最新的 CLOUD 檔案
                const cloudFiles = xlsmFiles.filter(item => item.name.toLowerCase().includes('cloud'));
                cloudFiles.sort((a, b) => b.name.localeCompare(a.name));
                
                if (cloudFiles.length > 0) {
                    const latestCloud = cloudFiles[0];
                    document.getElementById("link-cloud").href = latestCloud.download_url;
                    document.getElementById("text-cloud").innerText = `files/${latestCloud.name}`;
                    document.getElementById("text-cloud").className = "text-[11px] text-emerald-400 font-mono mt-0.5 truncate";
                } else {
                    document.getElementById("text-cloud").innerText = "❌ 找不到任何 Cloud 檔案";
                }

            } catch (err) {
                console.error("自動抓取最新檔案失敗:", err);
                document.getElementById("text-local").innerText = "⚠️ 無法取得最新版，請聯絡管理員";
                document.getElementById("text-cloud").innerText = "⚠️ 無法取得最新版，請聯絡管理員";
            }
        });

        // 🎯 匯出 Supabase 產品主檔
        async function downloadSupabaseProducts() {
            const btn = document.getElementById("btn-export-supabase");
            const statusText = document.getElementById("export-status");

            btn.disabled = true;
            statusText.innerText = "⏳ 正在連線 Supabase 雲端資料庫...";
            statusText.className = "text-[11px] text-yellow-400 font-mono mt-0.5 truncate";

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) throw new Error("資料庫連線回應異常");
                const rawData = await response.json();

                if (!rawData || rawData.length === 0) {
                    alert("⚠️ 雲端資料庫中目前沒有任何產品數據。");
                    return;
                }

                const fieldMapping = {
                    "item_no": "產品品號", "item_name": "產品品名", "spec": "產品規格",
                    "pack_qty": "入數", "unit_capacity": "每包容量", "pallets_box_qty": "每板箱數",
                    "length": "長", "width": "寬", "height": "高", "cubic_per_box": "才積",
                    "gross_weight": "毛重", "shelf_life": "保存年限", "base_qty": "每層底數",
                    "updated_at": "最後同步時間", "updated_by": "最後修改人員"
                };

                const translatedData = rawData.map(item => {
                    let newItem = {};
                    Object.keys(fieldMapping).forEach(engKey => {
                        if (item[engKey] !== undefined) newItem[fieldMapping[engKey]] = item[engKey];
                    });
                    return newItem;
                });

                const worksheet = XLSX.utils.json_to_sheet(translatedData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Products_List");

                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const hh = String(today.getHours()).padStart(2, '0');
                const min = String(today.getMinutes()).padStart(2, '0');
                const ss = String(today.getSeconds()).padStart(2, '0');

                const finalFileName = `產品主檔案_${yyyy}${mm}${dd}_${hh}${min}${ss}.xlsx`;
                XLSX.writeFile(workbook, finalFileName);

                statusText.innerText = `🎉 成功匯出 ${finalFileName}！`;
                statusText.className = "text-[11px] text-emerald-400 font-mono mt-0.5 truncate";
            } catch (err) {
                alert(`❌ 匯出失敗：${err.message}`);
                statusText.innerText = "發生技術錯誤，請重試。";
                statusText.className = "text-[11px] text-rose-400 font-mono mt-0.5 truncate";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
