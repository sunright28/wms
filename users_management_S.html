<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS 後台系統 - 人員權限管理中樞</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen">

    <header class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700/60 sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-600 text-white p-2.5 rounded-xl shadow-md shadow-emerald-900/30">
                <i class="fa-solid fa-users-gear text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-wider text-white">WMS 人員權限管理中樞</h1>
                <p class="text-xs text-emerald-400 font-medium">系統管理員專用：即時控管帳號、修改密碼、調整作業權限</p>
            </div>
        </div>
        <a href="order_dashboard.html" class="bg-slate-700 hover:bg-slate-600 text-slate-200 px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5 cursor-pointer shadow-xs">
            <i class="fa-solid fa-arrow-left-long"></i> 返回訂單管理中樞
        </a>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:p-6 space-y-6">

        <div class="bg-slate-800/60 rounded-2xl border border-slate-700/50 p-4 shadow-xl flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="relative flex-1 sm:w-72">
                    <input type="text" id="search-input" oninput="filterUsers()" placeholder="搜尋顯示名稱或工號..." class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 font-medium">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500 pointer-events-none"><i class="fa-solid fa-magnifying-glass text-xs"></i></span>
                </div>
            </div>
            
            <button onclick="openUserModal(false)" class="w-full sm:w-auto h-11 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-md shadow-emerald-950/40 transition-all flex items-center justify-center gap-2 cursor-pointer text-sm px-5">
                <i class="fa-solid fa-user-plus"></i> 新增成員帳號
            </button>
        </div>

        <div id="loader-status" class="hidden text-center py-16 space-y-3 bg-slate-800/20 rounded-2xl border border-dashed border-slate-700/60">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-3 border-emerald-500 border-t-transparent"></div>
            <p class="text-xs text-slate-400 tracking-wider">正在連線至資料庫，載入人員權限清單中...</p>
        </div>

        <div class="bg-slate-800/90 rounded-2xl border border-slate-700/60 shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-800 border-b border-slate-700/80 text-xs font-bold tracking-wider text-slate-400 uppercase">
                            <th class="px-6 py-4 w-16 text-center">ID</th>
                            <th class="px-6 py-4">顯示名稱 (Display Name)</th>
                            <th class="px-6 py-4">工號 / 登入帳號</th>
                            <th class="px-6 py-4">使用者密碼</th>
                            <th class="px-6 py-4">系統角色</th>
                            <th class="px-6 py-4">建立時間</th>
                            <th class="px-6 py-4 text-center w-40">操作管理</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body" class="divide-y divide-slate-700/40 text-xs font-medium">
                    </tbody>
                </table>
            </div>
            <div id="empty-state" class="hidden text-center py-16 bg-slate-800/30 text-slate-500 italic"><i class="fa-solid fa-users-slash text-3xl mb-2 block text-slate-600"></i> 目前沒有任何成員資料。</div>
        </div>

    </main>

    <div id="user-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden transition-all">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-fade-in space-y-4 p-6">
            <div class="flex justify-between items-center border-b border-slate-700 pb-3">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-circle-user text-emerald-400 text-lg"></i>
                    <h3 id="modal-title" class="font-black text-white text-base tracking-wide">新增系統成員</h3>
                </div>
                <button onclick="closeUserModal()" class="text-slate-400 hover:text-white transition-colors cursor-pointer"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <form id="user-form" onsubmit="saveUserForm(event)" class="space-y-4 text-xs">
                <input type="hidden" id="form-user-id">
                
                <div>
                    <label class="block font-bold text-slate-400 mb-1.5">顯示名稱 <span class="text-red-400">*</span></label>
                    <input type="text" id="form-display-name" required placeholder="例如：張小明" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white focus:outline-none focus:border-emerald-500">
                </div>

                <div>
                    <label class="block font-bold text-slate-400 mb-1.5">
                        工號 / 登入帳號 <span class="text-red-400">*</span>
                        <span id="username-notice" class="text-[10px] text-amber-500 ml-1.5 hidden">(修改時此欄位禁止變更)</span>
                    </label>
                    <input type="text" id="form-username" required placeholder="例如：9527 (PDA 登入以此為主)" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white font-mono focus:outline-none focus:border-emerald-500 disabled:bg-slate-950 disabled:text-slate-500 disabled:border-slate-800 disabled:cursor-not-allowed">
                </div>

                <div>
                    <label class="block font-bold text-slate-400 mb-1.5">登入密碼 <span class="text-red-400">*</span></label>
                    <input type="text" id="form-password" required placeholder="請輸入密碼 (PDA/後台登入驗證)" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white font-mono focus:outline-none focus:border-emerald-500">
                </div>

                <div>
                    <label class="block font-bold text-slate-400 mb-1.5">權限角色</label>
                    <select id="form-role" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white focus:outline-none focus:border-emerald-500">
                        <option value="picker">picker (現場撿貨員)</option>
                        <option value="admin">admin (系統管理員)</option>
                        <option value="supervisor">supervisor (現場組長)</option>
                    </select>
                </div>

                <div class="flex gap-3 pt-2 border-t border-slate-700/60">
                    <button type="button" onclick="closeUserModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold py-2.5 rounded-xl transition-all cursor-pointer">取消</button>
                    <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl shadow-md shadow-emerald-950/20 transition-all cursor-pointer">確認儲存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14";

        let allUsersCache = []; 

        document.addEventListener("DOMContentLoaded", () => { 
            fetchAllUsers(); 
        });

        // 📥 撈取所有 users 成員
        async function fetchAllUsers() {
            const loader = document.getElementById("loader-status");
            const tbody = document.getElementById("user-table-body");
            const emptyState = document.getElementById("empty-state");

            tbody.innerHTML = "";
            loader.classList.remove("hidden");
            emptyState.classList.add("hidden");

            try {
                const url = `${SUPABASE_URL}/rest/v1/users?select=*&order=id.asc`;
                const res = await fetch(url, { 
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } 
                });
                if (!res.ok) throw new Error(await res.text());
                
                allUsersCache = await res.json();
                renderUserList(allUsersCache);

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-red-400 font-mono">載入失敗: ${err.message}</td></tr>`;
            } finally { 
                loader.classList.add("hidden"); 
            }
        }

        // 📊 渲染表格資料
        function renderUserList(users) {
            const tbody = document.getElementById("user-table-body");
            const emptyState = document.getElementById("empty-state");
            tbody.innerHTML = "";

            if(users.length === 0) {
                emptyState.classList.remove("hidden");
                return;
            }
            emptyState.classList.add("hidden");

            users.forEach(user => {
                const tr = document.createElement("tr");
                tr.className = "hover:bg-slate-800/40 text-slate-300 transition-colors";
                
                let roleBadge = `<span class="bg-slate-700 text-slate-300 px-2 py-0.5 rounded text-[10px]">picker</span>`;
                if(user.role === 'admin') roleBadge = `<span class="bg-red-500/10 border border-red-500/30 text-red-400 font-bold px-2 py-0.5 rounded text-[10px]">admin</span>`;
                if(user.role === 'supervisor') roleBadge = `<span class="bg-blue-500/10 border border-blue-500/30 text-blue-400 font-bold px-2 py-0.5 rounded text-[10px]">supervisor</span>`;

                tr.innerHTML = `
                    <td class="px-6 py-3.5 font-mono text-slate-500 text-center">${user.id}</td>
                    <td class="px-6 py-3.5 text-white font-bold text-sm">${user.display_name || '未設定'}</td>
                    <td class="px-6 py-3.5 font-mono text-emerald-400 font-bold">${user.username || '無'}</td>
                    <td class="px-6 py-3.5 font-mono text-slate-400 bg-slate-900/30 rounded px-2 select-all">${user.password || '******'}</td>
                    <td class="px-6 py-3.5">${roleBadge}</td>
                    <td class="px-6 py-3.5 text-slate-500 font-mono">${formatDate(user.created_at)}</td>
                    <td class="px-6 py-3.5 text-center flex justify-center gap-2">
                        <button onclick='openUserModal(true, ${JSON.stringify(user).replace(/'/g, "&apos;")})' class="bg-indigo-600/20 hover:bg-indigo-600 text-indigo-400 hover:text-white border border-indigo-500/30 px-2.5 py-1.5 rounded-lg transition-all cursor-pointer flex items-center gap-1">
                            <i class="fa-solid fa-user-pen"></i> 修改
                        </button>
                        <button onclick="deleteUser(${user.id}, '${user.display_name}')" class="bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white border border-red-500/30 px-2.5 py-1.5 rounded-lg transition-all cursor-pointer flex items-center gap-1">
                            <i class="fa-solid fa-user-minus"></i> 刪除
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 🔍 人員篩選
        function filterUsers() {
            const query = document.getElementById("search-input").value.trim().toLowerCase();
            if(!query) {
                renderUserList(allUsersCache);
                return;
            }
            const filtered = allUsersCache.filter(user => {
                const name = (user.display_name || "").toLowerCase();
                const code = (user.username || "").toLowerCase();
                return name.includes(query) || code.includes(query);
            });
            renderUserList(filtered);
        }

        // 📂 控制彈窗開啟
        function openUserModal(isEdit, userData = null) {
            const modal = document.getElementById("user-modal");
            const title = document.getElementById("modal-title");
            const form = document.getElementById("user-form");
            const usernameInput = document.getElementById("form-username");
            const usernameNotice = document.getElementById("username-notice");
            
            form.reset();
            modal.classList.remove("hidden");

            if (isEdit && userData) {
                title.innerHTML = `修改成員權限 (ID: ${userData.id})`;
                document.getElementById("form-user-id").value = userData.id;
                document.getElementById("form-display-name").value = userData.display_name || "";
                document.getElementById("form-password").value = userData.password || "";
                document.getElementById("form-role").value = userData.role || "picker";
                
                usernameInput.value = userData.username || "";
                usernameInput.disabled = true; 
                usernameNotice.classList.remove("hidden");
            } else {
                title.innerHTML = `新增系統成員`;
                document.getElementById("form-user-id").value = "";
                document.getElementById("form-role").value = "picker";
                
                usernameInput.disabled = false;
                usernameNotice.classList.add("hidden");
            }
        }

        function closeUserModal() {
            document.getElementById("user-modal").classList.add("hidden");
        }

        // 💾 儲存處理 (新增 / 修改)
        async function saveUserForm(event) {
            event.preventDefault();
            
            const userId = document.getElementById("form-user-id").value;
            const displayName = document.getElementById("form-display-name").value.trim();
            const password = document.getElementById("form-password").value.trim();
            const role = document.getElementById("form-role").value;

            const isEdit = userId !== "";
            
            const payload = {
                display_name: displayName,
                password: password,
                role: role
            };

            if (!isEdit) {
                payload.username = document.getElementById("form-username").value.trim();
            }

            const url = isEdit ? `${SUPABASE_URL}/rest/v1/users?id=eq.${userId}` : `${SUPABASE_URL}/rest/v1/users`;
            const method = isEdit ? "PATCH" : "POST";

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(await res.text());

                alert(isEdit ? `🎉 成功更新人員：[ ${displayName} ] 的安全資料！` : `🎉 成功新增人員：[ ${displayName} ]！`);
                closeUserModal();
                fetchAllUsers();
            } catch (err) {
                alert(`⚠️ 操作失敗！\n詳細原因: ${err.message}`);
            }
        }

        // ❌ 刪除成員
        async function deleteUser(id, displayName) {
            if(!confirm(`🚨 確定要永久刪除成員 [ ${displayName} ] 嗎？\n這將完全移除此帳號！`)) return;

            try {
                const url = `${SUPABASE_URL}/rest/v1/users?id=eq.${id}`;
                const res = await fetch(url, {
                    method: "DELETE",
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });

                if (!res.ok) throw new Error(await res.text());

                alert(`🗑️ 人員 [ ${displayName} ] 已成功自系統中移除！`);
                fetchAllUsers();
            } catch (err) {
                alert(`刪除失敗！該人員可能已被指派或綁定現存的棧板出貨單據 (picker_id 關聯中)：\n${err.message}`);
            }
        }

        function formatDate(isoString) {
            if(!isoString) return "-";
            try {
                const d = new Date(isoString);
                if(isNaN(d.getTime())) return "-";
                return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.toTimeString().split(' ')[0]}`;
            } catch(e) { return "-"; }
        }
    </script>
</body>
</html>
