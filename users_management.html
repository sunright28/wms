<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS 後台系統 - 人員權限管理 (行動響應優化版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 行動端手勢與點擊優化 */
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen">

    <header class="bg-slate-800/90 backdrop-blur-md border-b border-slate-700/60 sticky top-0 z-50 px-4 py-3.5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 shadow-lg">
        <div class="flex items-center gap-2.5">
            <div class="bg-emerald-600 text-white p-2 rounded-xl shadow-md shadow-emerald-900/30 shrink-0">
                <i class="fa-solid fa-users-gear text-base"></i>
            </div>
            <div>
                <h1 class="text-base font-black tracking-wider text-white">WMS 人員權限管理</h1>
                <p class="text-[10px] text-emerald-400 font-medium">系統管理員專用：手機/PDA 行動操控中樞</p>
            </div>
        </div>
        <a href="order_dashboard.html" class="w-full sm:w-auto text-center bg-slate-700 hover:bg-slate-600 text-slate-200 px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1.5 shadow-xs cursor-pointer">
            <i class="fa-solid fa-arrow-left-long"></i> 返回訂單管理中樞
        </a>
    </header>

    <main class="max-w-7xl mx-auto p-3 sm:p-6 space-y-4">

        <div class="bg-slate-800/60 rounded-2xl border border-slate-700/50 p-3 shadow-xl flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="relative w-full sm:w-72">
                <input type="text" id="search-input" oninput="filterUsers()" placeholder="搜尋顯示名稱或工號..." class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 font-medium">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500 pointer-events-none"><i class="fa-solid fa-magnifying-glass text-xs"></i></span>
            </div>
            
            <button onclick="openUserModal(false)" class="w-full sm:w-auto h-11 bg-emerald-600 active:bg-emerald-700 text-white font-bold rounded-xl shadow-md shadow-emerald-950/40 transition-all flex items-center justify-center gap-2 cursor-pointer text-xs px-5">
                <i class="fa-solid fa-user-plus text-sm"></i> 新增成員帳號
            </button>
        </div>

        <div id="loader-status" class="hidden text-center py-12 space-y-3 bg-slate-800/20 rounded-2xl border border-dashed border-slate-700/60">
            <div class="inline-block animate-spin rounded-full h-7 w-7 border-3 border-emerald-500 border-t-transparent"></div>
            <p class="text-[11px] text-slate-400 tracking-wider">正在連線至遠端資料庫，載入人員清單...</p>
        </div>

        <div id="user-cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3.5"></div>

        <div id="empty-state" class="hidden text-center py-16 bg-slate-800/30 text-slate-500 italic rounded-2xl border border-dashed border-slate-800">
            <i class="fa-solid fa-users-slash text-2xl mb-2 block text-slate-600"></i> 目前沒有任何成員資料。
        </div>

    </main>

    <div id="user-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-xs flex items-center justify-center p-3 z-50 hidden transition-all">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-fade-in space-y-4 p-5 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center border-b border-slate-700 pb-3">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-circle-user text-emerald-400 text-base"></i>
                    <h3 id="modal-title" class="font-black text-white text-sm tracking-wide">新增系統成員</h3>
                </div>
                <button onclick="closeUserModal()" class="text-slate-400 p-1 active:text-white transition-colors cursor-pointer"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <form id="user-form" onsubmit="saveUserForm(event)" class="space-y-4 text-xs">
                <input type="hidden" id="form-user-id">
                
                <div>
                    <label class="block font-bold text-slate-400 mb-1">顯示名稱 <span class="text-red-400">*</span></label>
                    <input type="text" id="form-display-name" required placeholder="例如：張小明" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-white text-xs focus:outline-none focus:border-emerald-500">
                </div>

                <div>
                    <label class="block font-bold text-slate-400 mb-1">
                        工號 / 登入帳號 <span class="text-red-400">*</span>
                        <span id="username-notice" class="text-[10px] text-amber-500 ml-1 hidden">(禁止修改)</span>
                    </label>
                    <input type="text" id="form-username" required placeholder="例如：9527 (PDA 登入驗證碼)" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-white font-mono text-xs focus:outline-none focus:border-emerald-500 disabled:bg-slate-950 disabled:text-slate-500 disabled:border-slate-800 disabled:cursor-not-allowed">
                </div>

                <div>
                    <label class="block font-bold text-slate-400 mb-1">登入密碼 <span class="text-red-400">*</span></label>
                    <input type="text" id="form-password" required placeholder="請輸入密碼" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-white font-mono text-xs focus:outline-none focus:border-emerald-500">
                </div>

                <div>
                    <label class="block font-bold text-slate-400 mb-1">權限角色</label>
                    <select id="form-role" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-white text-xs focus:outline-none focus:border-emerald-500 h-11">
                        <option value="picker">picker (現場撿貨員)</option>
                        <option value="admin">admin (系統管理員)</option>
                        <option value="supervisor">supervisor (現場組長)</option>
                    </select>
                </div>

                <div class="flex gap-3 pt-3 border-t border-slate-700/60">
                    <button type="button" onclick="closeUserModal()" class="flex-1 h-11 bg-slate-700 active:bg-slate-600 text-slate-300 font-bold rounded-xl transition-all cursor-pointer">取消</button>
                    <button type="submit" class="flex-1 h-11 bg-emerald-600 active:bg-emerald-700 text-white font-bold rounded-xl shadow-md transition-all cursor-pointer">確認儲存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co";
        // 🔑 金鑰已徹底修正：帶有 Service Role 最高修改權限且尾數為「小寫 u8」的正確金鑰
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14";

        let allUsersCache = []; 

        document.addEventListener("DOMContentLoaded", () => { 
            fetchAllUsers(); 
        });

        // 📥 撈取遠端 users 帳號
        async function fetchAllUsers() {
            const loader = document.getElementById("loader-status");
            const container = document.getElementById("user-cards-container");
            const emptyState = document.getElementById("empty-state");

            container.innerHTML = "";
            loader.classList.remove("hidden");
            emptyState.classList.add("hidden");

            try {
                const url = `${SUPABASE_URL}/rest/v1/users?select=*&order=id.asc`;
                const res = await fetch(url, { 
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } 
                });
                if (!res.ok) throw new Error(await res.text());
                
                allUsersCache = await res.json();
                renderUserCards(allUsersCache);

            } catch (err) {
                container.innerHTML = `<div class="w-full text-center py-6 text-red-400 font-mono text-xs bg-red-500/10 border border-red-500/20 rounded-xl">載入失敗: ${err.message}</div>`;
            } finally { 
                loader.classList.add("hidden"); 
            }
        }

        // 📊 手機版 RWD 卡片化流渲染
        function renderUserCards(users) {
            const container = document.getElementById("user-cards-container");
            const emptyState = document.getElementById("empty-state");
            container.innerHTML = "";

            if(users.length === 0) {
                emptyState.classList.remove("hidden");
                return;
            }
            emptyState.classList.add("hidden");

            users.forEach(user => {
                const card = document.createElement("div");
                card.className = "bg-slate-800/90 rounded-2xl border border-slate-700/60 p-4 shadow-md space-y-3 flex flex-col justify-between";
                
                let roleBadge = `<span class="bg-slate-700 text-slate-300 px-2 py-0.5 rounded-md text-[10px] font-bold">picker (現場撿貨)</span>`;
                if(user.role === 'admin') roleBadge = `<span class="bg-red-500/10 border border-red-500/30 text-red-400 font-bold px-2 py-0.5 rounded-md text-[10px]">admin (系統管理)</span>`;
                if(user.role === 'supervisor') roleBadge = `<span class="bg-blue-500/10 border border-blue-500/30 text-blue-400 font-bold px-2 py-0.5 rounded-md text-[10px]">supervisor (現場組長)</span>`;

                card.innerHTML = `
                    <div class="space-y-2.5">
                        <div class="flex justify-between items-start gap-2">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-lg bg-emerald-600/10 text-emerald-400 flex items-center justify-center text-sm font-bold shrink-0 font-mono text-[11px] border border-emerald-500/10">${user.id}</div>
                                <h3 class="text-white font-black text-sm tracking-wide">${user.display_name || '未設定'}</h3>
                            </div>
                            <div>${roleBadge}</div>
                        </div>

                        <div class="bg-slate-900/50 rounded-xl border border-slate-700/30 p-2.5 space-y-1.5 text-[11px] font-medium">
                            <div class="flex justify-between items-center">
                                <span class="text-slate-500">工號/帳號</span>
                                <span class="font-mono text-emerald-400 font-bold text-xs">${user.username || '無'}</span>
                            </div>
                            <div class="border-t border-slate-800/60 my-1"></div>
                            <div class="flex justify-between items-center">
                                <span class="text-slate-500">登入密碼</span>
                                <span class="font-mono text-slate-300 bg-slate-900/80 px-2 py-0.5 rounded border border-slate-800 select-all tracking-wider font-bold">${user.password || '******'}</span>
                            </div>
                        </div>

                        <div class="text-[10px] font-mono text-slate-500 text-right">
                            創立於：${formatDate(user.created_at)}
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-700/40">
                        <button onclick='openUserModal(true, ${JSON.stringify(user).replace(/'/g, "&apos;")})' class="h-10 bg-indigo-600/10 active:bg-indigo-600 text-indigo-400 active:text-white border border-indigo-500/20 text-[11px] rounded-xl font-bold transition-all cursor-pointer flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-user-pen text-xs"></i> 修改資料
                        </button>
                        <button onclick="deleteUser(${user.id}, '${user.display_name}')" class="h-10 bg-red-500/10 active:bg-red-500 text-red-400 active:text-white border border-red-500/20 text-[11px] rounded-xl font-bold transition-all cursor-pointer flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-user-minus text-xs"></i> 永久移除
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 🔍 即時關鍵字過濾
        function filterUsers() {
            const query = document.getElementById("search-input").value.trim().toLowerCase();
            if(!query) {
                renderUserCards(allUsersCache);
                return;
            }
            const filtered = allUsersCache.filter(user => {
                const name = (user.display_name || "").toLowerCase();
                const code = (user.username || "").toLowerCase();
                return name.includes(query) || code.includes(query);
            });
            renderUserCards(filtered);
        }

        // 📂 控制彈窗面板
        function openUserModal(isEdit, userData = null) {
            const modal = document.getElementById("user-modal");
            const title = document.getElementById("modal-title");
            const form = document.getElementById("user-form");
            const usernameInput = document.getElementById("form-username");
            const usernameNotice = document.getElementById("username-notice");
            
            form.reset();
            modal.classList.remove("hidden");

            if (isEdit && userData) {
                title.innerHTML = `修改成員權限 (ID: ${userData.id})`;
                document.getElementById("form-user-id").value = userData.id;
                document.getElementById("form-display-name").value = userData.display_name || "";
                document.getElementById("form-password").value = userData.password || "";
                document.getElementById("form-role").value = userData.role || "picker";
                
                usernameInput.value = userData.username || "";
                usernameInput.disabled = true; 
                usernameNotice.classList.remove("hidden");
            } else {
                title.innerHTML = `新增系統成員`;
                document.getElementById("form-user-id").value = "";
                document.getElementById("form-role").value = "picker";
                
                usernameInput.disabled = false;
                usernameNotice.classList.add("hidden");
            }
        }

        function closeUserModal() {
            document.getElementById("user-modal").classList.add("hidden");
        }

        // 💾 儲存 (新增/修改) 整合
        async function saveUserForm(event) {
            event.preventDefault();
            
            const userId = document.getElementById("form-user-id").value;
            const displayName = document.getElementById("form-display-name").value.trim();
            const password = document.getElementById("form-password").value.trim();
            const role = document.getElementById("form-role").value;

            const isEdit = userId !== "";
            
            const payload = {
                display_name: displayName,
                password: password,
                role: role
            };

            if (!isEdit) {
                payload.username = document.getElementById("form-username").value.trim();
            }

            const url = isEdit ? `${SUPABASE_URL}/rest/v1/users?id=eq.${userId}` : `${SUPABASE_URL}/rest/v1/users`;
            const method = isEdit ? "PATCH" : "POST";

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(await res.text());

                alert(isEdit ? `🎉 成功更新人員：[ ${displayName} ] 的安全資料！` : `🎉 成功新增人員：[ ${displayName} ]！`);
                closeUserModal();
                fetchAllUsers();
            } catch (err) {
                alert(`⚠️ 操作失敗！\n詳細原因: ${err.message}`);
            }
        }

        // ❌ 永久移除帳號
        async function deleteUser(id, displayName) {
            if(!confirm(`🚨 確定要永久刪除成員 [ ${displayName} ] 嗎？\n這將完全移除此帳號！`)) return;

            try {
                const url = `${SUPABASE_URL}/rest/v1/users?id=eq.${id}`;
                const res = await fetch(url, {
                    method: "DELETE",
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });

                if (!res.ok) throw new Error(await res.text());

                alert(`🗑️ 人員 [ ${displayName} ] 已成功自系統中移除！`);
                fetchAllUsers();
            } catch (err) {
                alert(`刪除失敗！該人員可能已被指派或綁定現存的棧板出貨單據 (picker_id 關聯中)：\n${err.message}`);
            }
        }

        function formatDate(isoString) {
            if(!isoString) return "-";
            try {
                const d = new Date(isoString);
                if(isNaN(d.getTime())) return "-";
                return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.toTimeString().split(' ')[0]}`;
            } catch(e) { return "-"; }
        }
    </script>
</body>
</html>
