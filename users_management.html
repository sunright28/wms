<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS 人員權限管理控制台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 行動端手勢與點擊優化 */
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen p-4 md:p-8">
        <script>
            // 貼在 5 個子網頁 body 下方第一個 <script> 最頂端
            let CURRENT_USER_ID = "";
            let CURRENT_USER_ROLE = "";
            let CURRENT_USER_NAME = "";
            let CURRENT_USER_TABLE_ID = null; // 🌟【關鍵新增】：儲存 users 資料表的數字 id

            (function() {
                const cachedData = sessionStorage.getItem("currentUser");
                
                if (!cachedData) {
                    alert("🚨 安全警告：偵測到非法存取！請先從主系統登入驗證。");
                    window.location.href = "index.html";
                    return;
                }

                try {
                    const userObj = JSON.parse(cachedData);
                    
                    // 🌟 精確提取變數，包含最核心的數字 id
                    CURRENT_USER_TABLE_ID = userObj.id ? parseInt(userObj.id) : null; // 👈 提取數字 ID
                    CURRENT_USER_ID = userObj.username;                    // 帳號/工號字串
                    CURRENT_USER_ROLE = userObj.role ? userObj.role.trim().toLowerCase() : "user"; // 權限角色
                    CURRENT_USER_NAME = userObj.display_name;              // 顯示姓名

                    // 後台網頁的權限過濾（撿貨頁 pda_picking.html 可手動拿掉這段 if 判斷，但留著也沒關係，除非是出貨人員要用）
                    // if (CURRENT_USER_ROLE !== "admin" && CURRENT_USER_ROLE !== "supervisor") {
                    //     alert("❌ 權限不足：您目前的職責無法存取管理後台控制台！");
                    //     window.location.href = "index.html";
                    //     return;
                    // }
                } catch (e) {
                    sessionStorage.removeItem("currentUser");
                    window.location.href = "index.html";
                }
            })();
        </script>


    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(16,185,129,0.05),transparent_45%)] pointer-events-none"></div>

    <div class="max-w-7xl mx-auto space-y-6 relative z-10">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-800/60 p-4 rounded-2xl border border-slate-700/50 gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500/20 text-indigo-400 p-3 rounded-xl border border-indigo-500/30">
                    <i class="fa-solid fa-users-gear text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-wider text-slate-100">WMS 人員權限管理控制台</h1>
                    <p class="text-xs text-slate-400">目前登入：<span id="user-display" class="text-indigo-400 font-mono font-bold">驗證中...</span></p>
                </div>
            </div>
            <button onclick="window.location.replace('index.html')" class="text-xs bg-slate-700/50 hover:bg-slate-700 px-3 py-2 rounded-xl text-slate-300 hover:text-white font-medium transition-all cursor-pointer flex items-center">
                <i class="fa-solid fa-arrow-left mr-1"></i> 回主選單
            </button>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center bg-slate-800/40 p-4 rounded-2xl border border-slate-700/40 gap-3">
            <div class="relative flex-1 max-w-md">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                    <i class="fa-solid fa-magnifying-glass text-xs"></i>
                </span>
                <input type="text" id="search-input" oninput="filterUsers()" placeholder="輸入關鍵字搜尋工號或姓名..." class="w-full bg-slate-900 border border-slate-700/80 rounded-xl pl-9 pr-4 py-2 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="openAddModal()" class="flex-1 sm:flex-none bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 cursor-pointer shadow-md">
                    <i class="fa-solid fa-user-plus text-sm"></i> 新增權限帳號
                </button>
                <div id="loader-status" class="hidden text-xs text-indigo-400 font-medium items-center gap-1">
                    <i class="fa-solid fa-spinner animate-spin"></i> 同步中...
                </div>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700/60 shadow-xl space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-bold text-slate-400 tracking-wider flex items-center gap-1.5">
                    <i class="fa-solid fa-address-book text-indigo-400"></i> 系統即時同仁帳號群組清單
                </h2>
                <span class="text-xs bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-1 rounded-md font-medium">連線安全防護已啟動</span>
            </div>

            <div id="users-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="col-span-full border border-dashed border-slate-700 rounded-xl p-12 text-center text-sm text-slate-500">
                    <i class="fa-solid fa-spinner animate-spin mb-2 text-xl block text-indigo-500"></i>
                    正在向安全核心撈取組織架構數據...
                </div>
            </div>
        </div>

        <p class="text-center text-[11px] text-slate-600 font-mono">Secure Enterprise Routing Network | © 2026 WMS Control.</p>
    </div>

    <div id="user-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-xs flex items-center justify-center p-4 z-50 animate-fade-in">
        <div class="bg-slate-800 max-w-sm w-full p-6 rounded-2xl border border-slate-700 shadow-2xl space-y-4 relative">
            <button onclick="closeUserModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            
            <div class="flex items-center gap-2.5 border-b border-slate-700/50 pb-3">
                <div id="modal-icon-container" class="w-9 h-9 rounded-xl bg-indigo-600/20 text-indigo-400 flex items-center justify-center text-base shadow-inner">
                    <i class="fa-solid fa-user-gear"></i>
                </div>
                <div>
                    <h3 id="modal-title" class="text-sm font-black tracking-wider text-white">人員配置變更</h3>
                    <p class="text-[10px] text-slate-400">所有安全憑證密碼均採明文/直連格式儲存</p>
                </div>
            </div>

            <input type="hidden" id="target-id">

            <div class="space-y-3.5 text-xs">
                <div>
                    <label class="block font-bold text-slate-400 mb-1">作業工號 (User ID / 唯一索引鍵)</label>
                    <input type="text" id="input-username" placeholder="例: 120404" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white font-mono focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="block font-bold text-slate-400 mb-1">人員姓名 (Display Name)</label>
                    <input type="text" id="input-display-name" placeholder="例: 王小明" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="block font-bold text-slate-400 mb-1">安全系統密碼 (Password)</label>
                    <input type="text" id="input-password" placeholder="建議設定至少 4 位數純數字或英數" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="block font-bold text-slate-400 mb-1">功能群組權限 (System Role)</label>
                    <select id="input-role" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-indigo-500 transition-colors">
                        <option value="user">user (一般現場作業撿貨同仁)</option>
                        <option value="supervisor">supervisor (辦公室同仁/具備修改產品資料及下載權限)</option>
                        <option value="admin">admin (系統管理員/人員管理及重置訂單)</option>
                    </select>
                </div>
                
                <div class="flex gap-2 pt-2">
                    <button onclick="closeUserModal()" class="flex-1 bg-slate-700 hover:bg-slate-650 text-slate-300 font-bold py-2 rounded-xl transition-colors cursor-pointer">取消</button>
                    <button onclick="submitUserForm()" id="btn-modal-submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-xl transition-all cursor-pointer shadow-md">確認儲存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14";

        // 讀取網址參數以於表頭高亮渲染管理員尊稱
        const urlParams = new URLSearchParams(window.location.search);
        const currentOperator = CURRENT_USER_NAME;
        const currentRole = CURRENT_USER_ROLE;

        let allUsersCache = [];

        document.addEventListener("DOMContentLoaded", () => {
            // 與 order_dashboard 一致的動態表頭尊稱渲染語法
            document.getElementById("user-display").innerText = 
                (currentRole === 'admin') ? `${currentOperator} (系統管理員)` : currentOperator;

            fetchAllUsers();
        });

        // 📥 自 Supabase 獲取所有使用者名單
        async function fetchAllUsers() {
            const grid = document.getElementById("users-grid");
            const loader = document.getElementById("loader-status");
            loader.classList.remove("hidden");

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/users?order=username.asc`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                if(!res.ok) throw new Error("遠端安全網路連線中斷");
                
                allUsersCache = await res.json();
                renderUsersList(allUsersCache);

            } catch (err) {
                grid.innerHTML = `<div class="col-span-full bg-red-500/10 border border-red-500/30 text-red-400 p-4 rounded-xl text-xs font-mono">架構同步失敗: ${err.message}</div>`;
            } finally {
                loader.classList.add("hidden");
            }
        }

        // 📊 把資料渲染成卡片結構
        function renderUsersList(usersArray) {
            const grid = document.getElementById("users-grid");
            grid.innerHTML = "";

            if(usersArray.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500 italic text-xs">查無符合此條件的權限同仁檔案。</div>`;
                return;
            }

            usersArray.forEach(user => {
                let roleBadgeColor = "bg-slate-900 text-slate-400 border-slate-800";
                let roleIcon = '<i class="fa-solid fa-user text-slate-500"></i>';
                
                if (user.role === 'admin') {
                    roleBadgeColor = "bg-red-500/10 text-red-400 border-red-500/20";
                    roleIcon = '<i class="fa-solid fa-user-shield text-red-400"></i>';
                } else if (user.role === 'supervisor') {
                    roleBadgeColor = "bg-cyan-500/10 text-cyan-400 border-cyan-500/20";
                    roleIcon = '<i class="fa-solid fa-user-tie text-cyan-400"></i>';
                } else {
                    roleBadgeColor = "bg-indigo-500/10 text-indigo-400 border-indigo-500/20";
                    roleIcon = '<i class="fa-solid fa-user-gear text-indigo-400"></i>';
                }

                const card = document.createElement("div");
                card.className = "bg-slate-800/60 rounded-2xl border border-slate-700/50 p-4 hover:border-slate-600 transition-all shadow-md flex flex-col justify-between gap-4";
                
                card.innerHTML = `
                    <div class="space-y-3">
                        <div class="flex justify-between items-start gap-2">
                            <div class="flex items-center gap-2.5">
                                <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-sm border border-slate-800 shadow-inner">
                                    ${roleIcon}
                                </div>
                                <div>
                                    <h3 class="font-black text-white text-sm tracking-wide">${user.display_name || '未設定姓名'}</h3>
                                    <p class="text-[11px] font-mono text-slate-500 mt-0.5">工號: <span class="text-slate-300 font-bold">${user.username}</span></p>
                                </div>
                            </div>
                            <span class="text-[10px] border px-2 py-0.5 rounded-md font-bold font-mono ${roleBadgeColor}">
                                ${user.role || 'user'}
                            </span>
                        </div>

                        <div class="bg-slate-900/60 rounded-xl p-2.5 border border-slate-800/80 font-mono text-[11px] space-y-1">
                            <div class="flex justify-between"><span class="text-slate-500">安全系統密碼:</span><span class="text-slate-200 font-bold tracking-wider">${user.password}</span></div>
                            <div class="flex justify-between"><span class="text-slate-500">資料列唯一碼:</span><span class="text-slate-600 text-[10px]">ID-${user.id}</span></div>
                            <div class="flex justify-between"><span class="text-slate-500">帳號配置日期:</span><span class="text-slate-400">${formatDate(user.created_at)}</span></div>
                        </div>
                    </div>

                    <div class="flex gap-2 border-t border-slate-700/30 pt-2.5">
                        <button onclick="openEditModal(${JSON.stringify(user).replace(/"/g, '&quot;')})" class="flex-1 bg-slate-700/60 hover:bg-slate-700 text-slate-300 hover:text-white font-bold py-1.5 rounded-xl text-[11px] transition-colors flex items-center justify-center gap-1 cursor-pointer">
                            <i class="fa-solid fa-user-pen"></i> 編輯修改
                        </button>
                        <button onclick="deleteUser(${user.id}, '${user.display_name}')" class="flex-1 bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white border border-red-500/20 font-bold py-1.5 rounded-xl text-[11px] transition-all flex items-center justify-center gap-1 cursor-pointer">
                            <i class="fa-solid fa-user-minus"></i> 移除帳號
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 🔍 即時本機關鍵字篩選
        function filterUsers() {
            const query = document.getElementById("search-input").value.trim().toLowerCase();
            if(!query) {
                renderUsersList(allUsersCache);
                return;
            }
            const filtered = allUsersCache.filter(u => 
                String(u.username).toLowerCase().includes(query) || 
                String(u.display_name).toLowerCase().includes(query) ||
                String(u.role).toLowerCase().includes(query)
            );
            renderUsersList(filtered);
        }

        // 📂 彈窗控制開關
        function openAddModal() {
            document.getElementById("modal-title").innerText = "配置全新權限同仁";
            document.getElementById("target-id").value = "";
            document.getElementById("input-username").value = "";
            document.getElementById("input-username").disabled = false;
            document.getElementById("input-display-name").value = "";
            document.getElementById("input-password").value = "";
            document.getElementById("input-role").value = "user";
            
            document.getElementById("modal-icon-container").className = "w-9 h-9 rounded-xl bg-indigo-600/20 text-indigo-400 flex items-center justify-center text-base shadow-inner";
            document.getElementById("modal-icon-container").innerHTML = `<i class="fa-solid fa-user-plus"></i>`;
            
            document.getElementById("user-modal").classList.remove("hidden");
        }

        function openEditModal(userObj) {
            document.getElementById("modal-title").innerText = `更動 [ ${userObj.display_name} ] 身分安全配置`;
            document.getElementById("target-id").value = userObj.id;
            document.getElementById("input-username").value = userObj.username;
            document.getElementById("input-username").disabled = true; // 主鍵索引不允許修改
            document.getElementById("input-display-name").value = userObj.display_name || "";
            document.getElementById("input-password").value = userObj.password || "";
            document.getElementById("input-role").value = userObj.role || "user";

            document.getElementById("modal-icon-container").className = "w-9 h-9 rounded-xl bg-amber-600/20 text-amber-400 flex items-center justify-center text-base shadow-inner";
            document.getElementById("modal-icon-container").innerHTML = `<i class="fa-solid fa-user-pen"></i>`;

            document.getElementById("user-modal").classList.remove("hidden");
        }

        function closeUserModal() {
            document.getElementById("user-modal").classList.add("hidden");
        }

        // 📤 表單驗證與雲端提交 (INSERT / PATCH)
        async function submitUserForm() {
            const targetId = document.getElementById("target-id").value;
            const username = document.getElementById("input-username").value.trim();
            const displayName = document.getElementById("input-display-name").value.trim();
            const password = document.getElementById("input-password").value.trim();
            const role = document.getElementById("input-role").value;
            const btnSubmit = document.getElementById("btn-modal-submit");

            if(!username || !displayName || !password) {
                alert("🚨 欄位阻擋：工號、姓名與安全密碼均為必填，不可留空！");
                return;
            }

            const isEdit = (targetId !== "");
            
            // 阻擋惡意修改本尊或測試管理帳號的機制
            if (isEdit && (username === "120404" || username === "1") && role !== "admin") {
                alert("🚨 資安防禦：禁止調降核心系統測試管理員的 [admin] 權限職等！");
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1"></i> 同步中...`;

            try {
                const payload = {
                    display_name: displayName,
                    password: password,
                    role: role
                };

                let url = `${SUPABASE_URL}/rest/v1/users`;
                let method = "POST";
                let headers = {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                };

                if (isEdit) {
                    method = "PATCH";
                    url = `${url}?id=eq.${targetId}`;
                } else {
                    payload.username = username;
                }

                const res = await fetch(url, { method: method, headers: headers, body: JSON.stringify(payload) });
                if(!res.ok) {
                    const errText = await res.text();
                    if(errText.includes("duplicate key")) {
                        throw new Error(`工號 [ ${username} ] 已重複存在於系統中，無法建立！`);
                    }
                    throw new Error(errText);
                }

                alert(isEdit ? `🎉 成功更新人員：[ ${displayName} ] 的最新資料！` : `🎉 成功新增同仁權限帳號：[ ${displayName} ]！`);
                closeUserModal();
                fetchAllUsers();

            } catch (err) {
                alert(`⚠️ 作業失敗！\n錯誤訊息: ${err.message}`);
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "確認儲存";
            }
        }

        // ❌ 永久移除權限帳號
        async function deleteUser(id, displayName) {
            if(displayName === "測試管理員" || id === 1) {
                alert("🚨 資安防禦：核心系統出廠預設帳戶，禁止自前端直接移除！");
                return;
            }

            if(!confirm(`🚨 組織重組最高警告！\n\n確定要永久刪除同仁 [ ${displayName} ] 嗎？\n這將導致該帳號立刻失效且無法再登入系統！`)) return;

            try {
                const url = `${SUPABASE_URL}/rest/v1/users?id=eq.${id}`;
                const res = await fetch(url, {
                    method: "DELETE",
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });

                if (!res.ok) throw new Error(await res.text());

                alert(`🗑️ 帳號抹除成功！人員 [ ${displayName} ] 已自系統中移除。`);
                fetchAllUsers();
            } catch (err) {
                alert(`刪除失敗！該人員目前可能已被綁定於特定的現存棧板出貨單據中 (系統 picker_id 外鍵安全關聯保護中)：\n${err.message}`);
            }
        }

        // 📅 時間字串優化轉換
        function formatDate(isoString) {
            if(!isoString) return "-";
            try {
                const d = new Date(isoString);
                return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
            } catch(e) {
                return "-";
            }
        }
    </script>
</body>
</html>
