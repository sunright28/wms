<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Users 獨立登入測試沙盒</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 p-6 space-y-6">
        
        <div class="text-center">
            <div class="w-12 h-12 bg-amber-500/10 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-2 border border-amber-500/20">
                <i class="fa-solid fa-flask text-xl"></i>
            </div>
            <h1 class="text-lg font-bold tracking-wide text-amber-400">Users 登入連線測試沙盒</h1>
            <p class="text-xs text-gray-400 mt-1">此網頁為獨立測試用，將輸出最真實的 API 原始數據</p>
        </div>

        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-3 text-xs space-y-1 font-mono">
            <div class="text-gray-400 font-bold border-b border-gray-700 pb-1 mb-1 flex justify-between">
                <span>🌐 連線憑證狀態</span>
                <span class="text-green-400">已載入</span>
            </div>
            <div class="truncate"><span class="text-blue-400">URL:</span> https://mmqvewwmpzutyzrovnkp.supabase.co</div>
            <div class="truncate"><span class="text-blue-400">KEY:</span> eyJhbGciOiJIUzI1NiIsIn...8NK14</div>
            <div><span class="text-blue-400">Target Table:</span> <span class="bg-gray-700 px-1 rounded text-yellow-300 font-sans">users</span></div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">測試工號 / 帳號 (欄位: username)</label>
                <input type="text" id="test-username" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2.5 text-base text-white focus:outline-none focus:ring-2 focus:ring-amber-500 font-mono" placeholder="例如: 120404" value="120404">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">測試密碼 (欄位: password)</label>
                <input type="text" id="test-password" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2.5 text-base text-white focus:outline-none focus:ring-2 focus:ring-amber-500 font-mono" placeholder="例如: 123" value="123">
            </div>
            <button onclick="runLoginDiagnostics()" class="w-full bg-amber-500 hover:bg-amber-600 text-gray-900 font-bold py-3 rounded-xl shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-play"></i> 執行 API 登入診斷
            </button>
        </div>

        <div class="space-y-2">
            <label class="block text-xs font-semibold text-gray-400 flex justify-between">
                <span>🖥️ API 診斷主控台日誌 (Logs)</span>
                <button onclick="clearLogs()" class="text-gray-500 hover:text-gray-300 underline font-normal">清除日誌</button>
            </label>
            <div id="console-logs" class="w-full h-64 bg-black border border-gray-700 rounded-xl p-3 font-mono text-xs overflow-y-auto space-y-2 text-green-400 selection:bg-amber-500 selection:text-black">
                <div class="text-gray-500">// 點擊上方按鈕開始進行 API 診斷測試...</div>
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://mmqvewwmpzutyzrovnkp.supabase.co/rest/v1";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tcXZld3dtcHp1dHl6cm92bmtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTE0OTYsImV4cCI6MjA5NTg2NzQ5Nn0.taGVo2jp3Z5BQ0jmZiC0j-Yn5oVryFbHiopHst8NK14";

        function log(message, type = 'info') {
            const consoleBox = document.getElementById("console-logs");
            const time = new Date().toLocaleTimeString();
            let colorClass = "text-green-400";
            let prefix = "⚙️ [INFO]";

            if (type === 'success') { colorClass = "text-emerald-400 font-bold"; prefix = "✅ [SUCCESS]"; }
            if (type === 'warn') { colorClass = "text-amber-400"; prefix = "⚠️ [WARN]"; }
            if (type === 'error') { colorClass = "text-rose-400 font-bold"; prefix = "❌ [ERROR]"; }
            if (type === 'json') { colorClass = "text-cyan-300"; prefix = "📦 [DATA]"; }

            const logLine = document.createElement("div");
            logLine.className = `${colorClass} whitespace-pre-wrap break-all border-b border-gray-900 pb-1`;
            logLine.textContent = `[${time}] ${prefix} ${message}`;
            
            consoleBox.appendChild(logLine);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function clearLogs() {
            document.getElementById("console-logs").innerHTML = '<div class="text-gray-500">// 日誌已清除，等待下一次測試...</div>';
        }

        async function runLoginDiagnostics() {
            const usernameInput = document.getElementById("test-username").value.trim();
            const passwordInput = document.getElementById("test-password").value.trim();

            clearLogs();
            log(`開始診斷，準備驗證工號: "${usernameInput}"`);

            if (!usernameInput) {
                log("請輸入測試工號！", "error");
                return;
            }

            // 1. 構建請求 URL
            const requestUrl = `${SUPABASE_URL}/users?username=eq.${encodeURIComponent(usernameInput)}&select=*`;
            log(`發送網址: ${requestUrl}`);

            try {
                log("發送 Fetch 請求中 (不帶 Accept: application/json 標頭，對接預設 Public Schema)...");
                
                const startTime = performance.now();
                const res = await fetch(requestUrl, {
                    method: "GET",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });
                const endTime = performance.now();
                log(`伺服器響應完成，耗時: ${Math.round(endTime - startTime)}ms`);
                log(`HTTP 狀態碼: ${res.status} (${res.statusText})`, res.ok ? 'success' : 'error');

                // 如果回傳不是 200 OK 範圍
                if (!res.ok) {
                    const errorText = await res.text();
                    log(`資料庫拒絕請求！詳細錯誤回傳：`, "error");
                    log(errorText, "json");
                    
                    if (res.status === 406) {
                        log("提示: 406 通常代表 Schema 解析衝突，請確認資料表是否在 public 底下。", "warn");
                    } else if (res.status === 400) {
                        log("提示: 400 代表網址拼接語法錯誤，或者欄位名稱 'username' 在資料表中根本不存在！", "warn");
                    }
                    return;
                }

                // 解析 JSON
                const data = await res.json();
                log(`成功解譯 JSON 陣列，回傳資料筆數: ${data.length} 筆`);
                log(JSON.stringify(data, null, 2), "json");

                // 2. 驗證資料邏輯
                if (data.length === 0) {
                    log(`【診斷結果】: 查詢成功，但雲端資料表是空的！`, "warn");
                    log(`這代表 users 資料表裡根本沒有 username 為 "${usernameInput}" 的這列資料，請去 Supabase 後台新增此工號。`, "warn");
                    return;
                }

                const dbUser = data[0];
                log(`發現對應帳號！開始進行欄位及密碼比對...`);
                
                // 檢查欄位是否存在
                if (!dbUser.hasOwnProperty('password')) {
                    log(`核心錯誤：撈出來的資料裡找不到 "password" 欄位！請檢查您的資料表欄位名稱是不是寫錯了（例如寫成 pass、pwd 等）。`, "error");
                    return;
                }

                log(`資料庫中的密碼為: "${dbUser.password}" (型態: ${typeof dbUser.password})`);
                log(`您輸入的密碼為: "${passwordInput}" (型態: ${typeof passwordInput})`);

                if (String(dbUser.password) === String(passwordInput)) {
                    log(`【診斷結果】: 🎉 驗證完全成功！此帳號密碼可正常登入本系統！`, "success");
                    if(dbUser.display_name) {
                        log(`員工姓名: ${dbUser.display_name} | 權限: ${dbUser.role || '無定義'}`, "success");
                    }
                } else {
                    log(`【診斷結果】: ❌ 密碼比對失敗！工號存在，但您輸入的密碼與雲端資料庫不符。`, "error");
                }

            } catch (err) {
                log(`網路層級或解譯極端潰散！`, "error");
                log(err.stack || err.message, "error");
            }
        }
    </script>
</body>
</html>
